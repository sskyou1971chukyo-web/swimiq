          if(!SK_RACES.some(x=>x.url===r.url)) SK_RACES.push(r);
        });
        if(item.depth < 3){
          seikoLinks(text, item.u, folder).forEach(u=>{
            if(!seen.has(u) && seen.size < 100){ seen.add(u); queue.push({u, depth:item.depth+1}); }
          });
        }
      }
      if(SK_RACES.length===0){
        msg.innerHTML = '<div class="errmsg">種目のPDFが見つかりませんでした。下の診断のスクショを送ってください。</div>';
        const links = visited.slice(0, 30).map(u=>u.replace('https://swim.seiko.co.jp',''));
        out.innerHTML = '<p class="hint">診断: ' + visited.length + 'ページ読みました。読んだページ: ' + esc(links.join(' , ')) + '</p>' +
          '<div class="tablewrap" style="max-height:220px"><pre style="white-space:pre-wrap; font-size:.85rem; padding:10px">'
          + esc(String(firstText).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').slice(0,1200)) + '</pre></div>';
        return;
      }
      msg.innerHTML = `<div class="okmsg">${SK_RACES.length}個のPDFが見つかりました。読みたいものにチェックを入れて、下のボタンを押してください。おすすめは、日ごとの、種目別結果、です。スタートリストには記録が載っていません。読み取りは1個あたり10〜30秒かかります。</div>`;
      let h = '<div class="stack" style="margin-bottom:8px">' +
        '<button type="button" class="btn red solid" onclick="skPickResults()">種目別結果だけ選ぶ</button>' +
        '<button type="button" class="btn ghost" onclick="document.querySelectorAll(\'.skrace\').forEach(c=>c.checked=true)">全部選ぶ</button>' +
        '<button type="button" class="btn ghost" onclick="document.querySelectorAll(\'.skrace\').forEach(c=>c.checked=false)">全部外す</button></div>' +
        '<div class="tablewrap" style="max-height:420px"><table><tr><th></th><th>種目</th></tr>';
      SK_RACES.forEach((r,i)=>{
        const fname = r.url.split('/').pop();
        h += `<tr><td><input type="checkbox" class="skrace" data-i="${i}" style="width:26px;height:26px"></td>
          <td style="min-height:40px">${esc(r.label)} <span style="color:var(--gray); font-size:.85rem">(${esc(fname)})</span></td></tr>`;
      });
      out.innerHTML = h + '</table></div>' +
        '<div class="stack" style="margin-top:10px"><button class="btn red solid big" onclick="adminSeikoRead()">選んだ種目をAIで読み取る</button></div>' +
        '<div id="skOut2" style="margin-top:10px"></div>';
    }catch(err){
      msg.innerHTML = '<div class="errmsg">読み取れませんでした: '+esc(err.message)+
        '。GAS側(v3)にseikoの窓口が入っているか、確認してください。</div>';
    }
  };
  // 二段目: 選ばれた種目のPDFを、AIで1枚ずつ読む
  window.adminSeikoRead = async function(){
    const msg = document.getElementById('skMsg');
    const out2 = document.getElementById('skOut2');
    const kws = document.getElementById('skWho').value.trim();
    const picked = [];
    document.querySelectorAll('.skrace').forEach(c=>{ if(c.checked) picked.push(SK_RACES[Number(c.dataset.i)]); });
    if(picked.length===0){ msg.innerHTML = '<div class="errmsg">読み取る種目にチェックを入れてください。</div>'; return; }
    SK_HITS = [];
    const errors = [];
    for(let i=0; i<picked.length; i++){
      msg.innerHTML = `<div class="loading">AIが読み取り中 ${i+1}/${picked.length}種目 (${Math.round((i+1)/picked.length*100)}%)… ${esc(picked[i].label)}</div>`;
      let data;
      try{ data = await seikoPdfFetch(picked[i].url, kws); }catch(e){ data = { error: '通信エラー' }; }
      if(data.error){
        // 一回だけ自動で読み直す
        try{ data = await seikoPdfFetch(picked[i].url, kws); }catch(e){ data = { error: '通信エラー' }; }
      }
      if(data.error){ errors.push(picked[i].label + ': ' + data.error); continue; }
      // 種目は行ごとにAIが付けてくる。付いていなければPDF全体の種目や、種目名の文字から補う
      const fallback = (data.stroke && data.dist)
        ? { sex:data.sex, dist:Number(data.dist), stroke:data.stroke, round:data.round||'' }
        : (seikoEvent(picked[i].label) || {});
      (data.rows||[]).forEach(r=>{
        if(!r || !r.name || !r.time) return;
        const ev = (r.stroke && r.dist)
          ? { sex:r.sex||'', dist:Number(r.dist), stroke:r.stroke, round:r.round||'' }
          : fallback;
        if(!ev.stroke || !ev.dist) return;
        SK_HITS.push({
          name: String(r.name).replace(/[\s\u3000]+/g,''),
          team: String(r.team||''),
          sex: ev.sex||'', dist: ev.dist||0, stroke: ev.stroke||'',
          round: ev.round||'', time: fmtTime(String(r.time).trim())
        });
      });
    }
    // 同じ名前・種目・タイムの重複は1つにまとめる
    const uniq = {};
    SK_HITS = SK_HITS.filter(h=>{
      const k = h.name+'_'+h.dist+h.stroke+'_'+h.time;
      if(uniq[k]) return false; uniq[k] = 1; return true;
    });
    const errNote = errors.length? '<div class="errmsg">読めなかった種目: '+esc(errors.join(' / '))+'</div>' : '';
    if(SK_HITS.length===0){
      msg.innerHTML = errNote + '<div class="errmsg">対象の選手が見つかりませんでした。探す名前や所属の書き方を、ページの書き方(例: 中京大)に合わせてみてください。</div>';
      return;
    }
    msg.innerHTML = errNote + `<div class="okmsg">${SK_HITS.length}件見つかりました。名前を直せます。いらない行はチェックを外して、下のボタンで登録してください。</div>`;
    let h = '<div class="tablewrap"><table><tr><th></th><th>名前</th><th>所属</th><th>種目</th><th>ラウンド</th><th>タイム</th></tr>';
    SK_HITS.forEach((r,i)=>{
      h += `<tr><td><input type="checkbox" class="skchk" data-i="${i}" checked style="width:26px;height:26px"></td>
        <td><input type="text" class="skname" data-i="${i}" value="${esc(r.name)}" style="min-width:120px"></td>
        <td class="nw">${esc(r.team)}</td>
        <td class="nw">${esc(r.sex)} ${evShort(r.dist, r.stroke)}</td>
        <td class="nw">${esc(r.round||'-')}</td>
        <td class="num nw">${esc(r.time)}</td></tr>`;
    });
    out2.innerHTML = h + '</table></div>' +
      '<div class="stack" style="margin-top:10px"><button class="btn red solid big" onclick="adminSeikoSave()">選んだ記録を登録する</button></div>';
  };
  window.adminSeikoSave = async function(){
    const msg = document.getElementById('skMsg');
    const meet = document.getElementById('skMeet').value.trim();
    const date = document.getElementById('skDate').value;
    const year = Number(document.getElementById('skYear').value);
    const month = Number(document.getElementById('skMonth').value);
    const course = document.getElementById('skCourse').value;
    if(!meet){ msg.innerHTML = '<div class="errmsg">大会名を入れてください。</div>'; return; }
    // チェックの入った行だけ集める(名前は直した内容を使う)
    const rows = [];
    document.querySelectorAll('.skchk').forEach(c=>{
      if(!c.checked) return;
      const i = Number(c.dataset.i);
      const name = document.querySelector(`.skname[data-i="${i}"]`).value.trim();
      if(!name) return;
      rows.push({ name, event: SK_HITS[i].dist + SK_HITS[i].stroke, time: SK_HITS[i].time });
    });
    if(rows.length===0){ msg.innerHTML = '<div class="errmsg">登録する行がありません。</div>'; return; }
    if(!confirm(rows.length+'件を '+meet+' ('+course+') として登録します。よろしいですか。')) return;
    try{
      msg.innerHTML = '<div class="loading">登録しています…</div>';
      // 大会がまだ登録されていなければ、先に登録する
      const exists = (INIT.meets||[]).some(m=>m.meet===meet && m.year===year && m.month===month && (m.course||'')===course);
      if(!exists) await apiSave({ action:'addMeet', password:ADMIN_PW, meet, year, month, course });
      await apiSave({ action:'saveBatch', meet, course, date, records: rows });
      localStorage.removeItem('cust_rec_cache');
      msg.innerHTML = `<div class="okmsg">${rows.length}件を登録しました。閲覧画面の試合で探すから確認できます。</div>`;
      document.getElementById('skOut').innerHTML = '';
      const o2 = document.getElementById('skOut2'); if(o2) o2.innerHTML = '';
    }catch(err){
      msg.innerHTML = '<div class="errmsg">登録できませんでした: '+esc(err.message)+'</div>';
    }
  };
  // 歴代記録の打ち込み(閲覧画面から設定画面へ移動したもの)
  let agCur = null;
  eventPicker(document.getElementById('agPick'), st=>{ agCur = st; }, true);
  window.adminSaveLegacy = async function(){
    const msg = document.getElementById('agMsg');
    const name = document.getElementById('agName').value.trim();
    let time = document.getElementById('agTime').value.trim();
    const year = document.getElementById('agYear').value.trim();
    if(!name){ msg.innerHTML = '<div class="errmsg">名前を入れてください。</div>'; return; }
    // 数字だけの入力(例 15483)も受け付けて 1:54.83 の形に直す
    if(/^\d{3,6}$/.test(time) && digitsValid(time)) time = digitsToTime(time);
    const sec = toSec(time);
    if(sec==null){ msg.innerHTML = '<div class="errmsg">タイムの形が読めません。15483 のように数字だけか、1:54.83 の形で入れてください。</div>'; return; }
    msg.innerHTML = '<div class="loading">登録しています…</div>';
    try{
      await apiSave({ action:'saveLegacy', name:name, sex:agCur.sex,
        event: agCur.dist + agCur.stroke, course: agCur.course,
        time: toStr(sec), year: year });
      // 手元のデータにもすぐ足して、歴代記録の画面に反映されるようにする
      if(DATA)(DATA.legacy = DATA.legacy||[]).push({ name:name, sex:agCur.sex,
        event: agCur.dist+agCur.stroke, course:agCur.course, time:toStr(sec), year:year });
      localStorage.removeItem('cust_rec_cache');
      document.getElementById('agName').value=''; document.getElementById('agTime').value=''; document.getElementById('agYear').value='';
      msg.innerHTML = `<div class="okmsg">登録しました。${esc(name)} ${toStr(sec)}</div>`;
    }catch(err){
      msg.innerHTML = '<div class="errmsg">登録できませんでした: '+esc(err.message)+'</div>';
    }
  };
  document.getElementById('apSearch').addEventListener('input', adminSearchAthlete);
}

let ADMIN_ORIGINAL_NAME = '';
function adminSearchAthlete(){
  const q = document.getElementById('apSearch').value.trim();
  const box = document.getElementById('apHits');
  box.innerHTML = '';
  if(!q) return;
  INIT.roster.filter(p=>p.name.includes(q)||p.kana.includes(q)).slice(0,8).forEach(p=>{
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = p.name + (p.grade? '('+p.grade+')':'');
    b.onclick = ()=>{
      ADMIN_ORIGINAL_NAME = p.name;
      document.getElementById('apName').value = p.name;
      document.getElementById('apKana').value = p.kana||'';
      document.getElementById('apSex').value = p.sex||'';
      let bv = '';
      if(p.birth){
        const d = new Date(p.birth.replace(/\//g,'-'));
        if(!isNaN(d.getTime())) bv = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
      document.getElementById('apBirth').value = bv;
      document.getElementById('apMsg').innerHTML = '';
    };
    box.appendChild(b);
  });
}

async function adminImportStd(){
  const msg = document.getElementById('asMsg');
  const kind = document.getElementById('asKind').value;
  const pasted = document.getElementById('asText').value.trim();
  const file = document.getElementById('asFile').files[0];
  if(!pasted && !file){
    msg.innerHTML='<div class="errmsg">ページの文字を貼り付けるか、スクショ画像を選んでください。</div>';
    return;
  }
  msg.innerHTML = '<div class="loading">AIが表を読み取っています。30秒ほどかかることがあります…</div>';
  try{
    let res;
    if(pasted){
      // 文字の貼り付け方式(精度が高いのでこちらを優先)
      res = await apiSave({ action:'importStandardsText', password:ADMIN_PW,
        kind:kind, text:pasted });
    } else {
      // スクショ画像方式
      const b64 = await new Promise((ok, ng)=>{
        const r = new FileReader();
        r.onload = ()=>ok(String(r.result).split(',')[1]);
        r.onerror = ()=>ng(new Error('画像が読めませんでした'));
        r.readAsDataURL(file);
      });
      res = await apiSave({ action:'importStandards', password:ADMIN_PW,
        kind:kind, image:b64, mime:file.type||'image/png' });
    }
    INIT = null; localStorage.removeItem('cust_rec_cache');
    await loadInit();
    msg.innerHTML = `<div class="okmsg">${esc(kind)}の標準記録を${res.count}件登録しました。閲覧の標準記録画面で確認できます。</div>`;
    document.getElementById('asFile').value='';
    document.getElementById('asText').value='';
  }catch(err){
    msg.innerHTML = '<div class="errmsg">取り込めませんでした: '+esc(err.message)+'</div>';
  }
}

  body.innerHTML = `
    <div class="card redline" style="max-width:720px; margin:0 auto">
      <h2>はじめに この携帯の持ち主を登録</h2>
      <p class="hint">一度登録すると、次からこの携帯で開いた瞬間に自分の記録が表示されます。名簿に男女や生年月日が入っていない場合は、ここで入れた内容が自動で登録されます。</p>
      <div id="wFinder"></div>
      <div id="wForm" hidden style="margin-top:14px">
        <p style="font-weight:700" id="wName"></p>
        <div class="stack" style="align-items:end">
          <label class="fld">男女
            <select id="wSex"><option value="">未設定</option><option value="男">男</option><option value="女">女</option></select></label>
          <label class="fld">生年月日<input type="date" id="wBirth"></label>
          <button class="btn solid big" onclick="welcomeSave()">この携帯に登録する</button>
        </div>
      </div>
      <div id="wMsg" style="margin-top:10px"></div>
      <div style="margin-top:14px"><button class="btn ghost" onclick="skipWelcome()">登録せずに使う(コーチ・スタッフ用)</button></div>
    </div>`;
  let picked = null;
  makeFinder(document.getElementById('wFinder'), p=>{
    picked = p;
    document.getElementById('wForm').hidden = false;
    document.getElementById('wName').textContent = picked.name + ' さんですね。男女と生年月日を確認してください。';
    document.getElementById('wSex').value = p.sex || '';
    if(p.birth){
      const d = new Date(p.birth.replace(/\//g,'-'));
      if(!isNaN(d.getTime())){
        document.getElementById('wBirth').value =
          d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
    }
    document.getElementById('wForm').scrollIntoView({behavior:'smooth'});
  });
  window.welcomeSave = async function(){
    if(!picked) return;
    const sex = document.getElementById('wSex').value;
    const birth = document.getElementById('wBirth').value;
    const msg = document.getElementById('wMsg');
    msg.innerHTML = '<div class="loading">登録しています…</div>';
    try{
      await apiSave({ action:'saveProfile', name:picked.name, sex:sex, birth:birth });
      const p = INIT.roster.find(x=>x.name===picked.name);
      if(p){ p.sex = sex; p.birth = birth; }
      localStorage.setItem('cust_my_profile', JSON.stringify({ name:picked.name, sex:sex, birth:birth }));
      openMyPage(picked.name);
    }catch(err){
      msg.innerHTML = '<div class="errmsg">登録できませんでした: '+esc(err.message)+'</div>';
    }
  };
  window.skipWelcome = function(){
    localStorage.setItem('cust_my_profile', JSON.stringify({ name:'', staff:true }));
    inputBuilt = true; startInput(); showTabBare('input');
  };
}

// タブの見た目だけ切りかえる(処理は呼ばない)
function showTabBare(t){
  currentTab = t;
  document.getElementById('tabInput').setAttribute('aria-selected', t==='input');
  document.getElementById('tabView').setAttribute('aria-selected', t==='view');
  document.getElementById('tabAdmin').setAttribute('aria-selected', t==='admin');
  document.getElementById('paneInput').hidden = t!=='input';
  document.getElementById('paneView').hidden = t!=='view';
  document.getElementById('paneAdmin').hidden = t!=='admin';
}

async function openMyPage(name){
  showTabBare('view');
  currentMode = 'graph';
  document.querySelectorAll('.mode').forEach(b=>b.setAttribute('aria-selected', b.dataset.m==='graph'));
  const body = document.getElementById('viewBody');
  body.innerHTML = '<div class="loading">あなたの記録を読み込んでいます…</div>';
  try{
    await loadRecords();
    viewGraph(name);   // 本人のグラフを自動で表示する
  }catch(err){
    body.innerHTML = '<div class="errmsg">読み込めませんでした: '+esc(err.message)+'</div>';
  }
}

/* ============================================================
   お知らせ (試合の追加・アプリの更新)
============================================================ */
function banner(text, kind, btnLabel, btnFn){
  const box = document.getElementById('globalMsg');
  const div = document.createElement('div');
  div.className = kind==='ok' ? 'okmsg' : 'errmsg';
  div.style.cssText = 'margin-bottom:14px; display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; text-align:left;';
  const span = document.createElement('span');
  span.textContent = text;
  div.appendChild(span);
  if(btnLabel){
    const b = document.createElement('button');
    b.className = 'btn ' + (kind==='ok'?'solid':'red solid');
    b.style.minHeight = '48px';
    b.textContent = btnLabel;
    b.onclick = btnFn;
    div.appendChild(b);
  }
  const close = document.createElement('button');
  close.className = 'btn ghost';
  close.style.minHeight = '48px';
  close.textContent = '閉じる';
  close.onclick = ()=>div.remove();
  div.appendChild(close);
  box.appendChild(div);
}

// 新しい試合が登録されていたら知らせる
function checkMeetNews(){
  const key = 'cust_known_meets';
  const nowList = INIT.meets.map(m=>m.meet+'_'+m.year+'_'+m.month+'_'+(m.course||''));
  let known = null;
  try{ known = JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
  if(known){
    const fresh = nowList.filter(k=>!known.includes(k));
    if(fresh.length>0){
      const names = fresh.slice(0,3).map(k=>k.split('_')[0]).join('、');
      banner(`試合が更新されました。新しく ${names} が追加されています。`, 'ok');
    }
  }
  localStorage.setItem(key, JSON.stringify(nowList));
}

// 新しい版を初めて開いたときに、更新内容を一度だけ知らせる
function announceAppNews(){
  const key = 'cust_seen_version';
  const seen = localStorage.getItem(key);
  if(seen && seen !== APP_VERSION){
    banner('アプリが新しくなりました。' + APP_NEWS, 'ok');
  }
  localStorage.setItem(key, APP_VERSION);
}

// GitHub上のアプリが新しくなっていたら更新ボタンを出す
async function checkAppUpdate(){
  if(location.protocol === 'file:') return;  // 手元で開いたときは確認しない
  try{
    const url = location.href.split('?')[0].split('#')[0] + '?v=' + Date.now();
    const res = await fetch(url, { cache:'no-store' });
    const text = await res.text();
    const m = text.match(/APP_VERSION\s*=\s*'([^']+)'/);
    if(m && m[1] !== APP_VERSION){
      banner('アプリが新しくなっています。更新ボタンを押してください。', 'ok',
        '更新する', ()=>{ location.replace(location.pathname + '?v=' + Date.now()); });
    }
  }catch(e){}
}

/* ============================================================
   起動
============================================================ */
async function boot(){
  const body = document.getElementById('inBody');
  body.innerHTML = '<div class="loading">読み込んでいます…</div>';
  try{
    await loadInit();
  }catch(err){
    body.innerHTML = '<div class="errmsg">読み込めませんでした: '+esc(err.message)+
      '。通信の状態と、ファイル冒頭の GAS_URL を確認してください。</div>';
    return;
  }
  checkMeetNews();
  checkAppUpdate();
  announceAppNews();
  const my = myProfile();
  if(my && my.staff){
    showTab('view');   // 標準は記録を見るタブ
  } else if(my && my.name && INIT.roster.find(p=>p.name===my.name)){
    syncMyProfile(my);
    openMyPage(my.name);
  } else {
    showWelcome();
  }
}
boot();
</script>
