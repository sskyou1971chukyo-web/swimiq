<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CUST 記録帳 | 中京大学水泳部</title>
<!-- ホーム画面に追加したとき、アプリのように全画面で開くための設定 -->
<meta name="theme-color" content="#1663C7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CUST記録帳">
<link rel="manifest" href="swimrec_manifest.webmanifest">
<link rel="apple-touch-icon" href="swimrec-icon-180.png">
<link rel="icon" type="image/png" href="swimrec-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=M+PLUS+1:wght@500;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ================= 基本デザイン =================
   赤・青・白 = プールのコースロープの配色
   フォント = BIZ UDゴシック (低視力の方向けのUDフォント)
=================================================== */
:root{
  --blue:      #1663C7;   /* プールブルー */
  --blue-deep: #0D2B52;   /* 電光掲示板の紺 */
  --blue-pale: #E6F0FB;   /* うすい水色 */
  --red:       #E5372E;   /* コースロープの赤 */
  --red-pale:  #FDEAE8;
  --white:     #FFFFFF;
  --bg:        #F3F8FE;
  --ink:       #14273F;   /* 本文の濃紺 */
  --gray:      #5E718A;
  --line:      #C9D8EA;
  --gold:      #F5B301;
  --silver:    #94A7BC;
  --bronze:    #C77B3F;
  --green:     #17934A;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:18px; }
body{
  font-family:"BIZ UDPGothic","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.num{ font-family:"M PLUS 1","BIZ UDPGothic",sans-serif; font-variant-numeric:tabular-nums; }

/* ---------- ヘッダーとコースロープ ---------- */
header{ background:var(--white); padding:18px 24px 14px; }
.brand{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.brand h1{ font-size:1.6rem; font-weight:700; letter-spacing:.02em; margin:0; line-height:0; }
.brand img.logo{ height:64px; width:auto; display:block; }
.brand .sub{ color:var(--gray); font-size:.95rem; }
/* コースロープ: 赤白青の帯。このアプリの目印です */
.rope{ height:12px; background:repeating-linear-gradient(90deg,
  var(--red) 0 34px, var(--white) 34px 46px, var(--blue) 46px 80px, var(--white) 80px 92px); }

/* ---------- 大タブ (入力 / 閲覧) ---------- */
.tabs{ display:flex; gap:14px; padding:16px 24px 0; max-width:1180px; margin:0 auto; }
.tab{
  flex:1; min-height:64px; font-size:1.25rem; font-weight:700;
  border:3px solid var(--blue); border-radius:14px 14px 0 0;
  background:var(--white); color:var(--blue); cursor:pointer;
}
.tab[aria-selected="true"]{ background:var(--blue); color:var(--white); }
.tab.red{ border-color:var(--red); color:var(--red); }
.tab.red[aria-selected="true"]{ background:var(--red); color:var(--white); }
.tab:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
/* タブの大きさの比率 入力:見る:設定 = 2:6:2 */
.tabs .tab:nth-child(1){ flex:2; }
.tabs .tab:nth-child(2){ flex:6; }
.tabs .tab:nth-child(3){ flex:2; }

main{ max-width:1180px; margin:0 auto; padding:20px 24px 80px; }

/* ---------- 閲覧のモード選択 ---------- */
.modes{ display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:22px; }
.mode{
  min-height:62px; font-size:1.08rem; font-weight:700;
  border:2.5px solid var(--line); border-radius:12px;
  background:var(--white); color:var(--ink); cursor:pointer;
}
.mode[aria-selected="true"]{ border-color:var(--red); background:var(--red); color:var(--white); }
.mode:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }

/* ---------- 共通部品 ---------- */
.card{ background:var(--white); border:1.5px solid var(--line); border-radius:16px; padding:22px; margin-bottom:20px; }
.card h2{ font-size:1.25rem; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.card h2::before{ content:""; width:10px; height:26px; border-radius:4px; background:var(--blue); }
.card.redline h2::before{ background:var(--red); }
.hint{ color:var(--gray); font-size:.95rem; margin-bottom:10px; }
.stack{ display:flex; flex-wrap:wrap; gap:10px; }

.btn{
  min-height:58px; padding:10px 22px; font-size:1.08rem; font-weight:700;
  border-radius:12px; border:2.5px solid var(--blue);
  background:var(--white); color:var(--blue); cursor:pointer;
  font-family:inherit;
}
.btn:hover{ background:var(--blue-pale); }
.btn.on{ background:var(--blue); color:var(--white); }
.btn.big{ min-height:72px; font-size:1.3rem; padding:12px 34px; }
.btn.red{ border-color:var(--red); color:var(--red); }
.btn.red.on, .btn.red.solid{ background:var(--red); color:var(--white); }
.btn.solid{ background:var(--blue); color:var(--white); }
.btn.ghost{ border-color:var(--line); color:var(--gray); }
.btn:disabled{ opacity:.4; cursor:not-allowed; }
.btn:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }

select,input[type="text"]{
  font-family:inherit; font-size:1.1rem; padding:12px 14px;
  border:2.5px solid var(--line); border-radius:12px; background:var(--white);
  min-height:58px; color:var(--ink);
}
select:focus,input:focus{ outline:4px solid var(--gold); outline-offset:1px; }
label.fld{ display:flex; flex-direction:column; gap:6px; font-weight:700; font-size:.95rem; }

/* ---------- 選手を探す部品 ---------- */
.finder .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.chip{
  min-height:52px; padding:6px 18px; font-size:1.02rem; font-weight:700;
  border:2.5px solid var(--line); border-radius:999px;
  background:var(--white); color:var(--ink); cursor:pointer; font-family:inherit;
}
.chip.on{ border-color:var(--blue); background:var(--blue); color:var(--white); }
.chip.on.redc{ border-color:var(--red); background:var(--red); }
.chip:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.athlist{ display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:10px; margin-top:12px; }
.ath{
  min-height:66px; border:2.5px solid var(--line); border-radius:12px;
  background:var(--white); cursor:pointer; text-align:left; padding:8px 14px; font-family:inherit;
}
.ath:hover{ border-color:var(--blue); background:var(--blue-pale); }
.ath .nm{ font-size:1.15rem; font-weight:700; display:block; }
.ath .kn{ color:var(--gray); font-size:.85rem; }
.ath:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.ath.sel{ border-color:var(--red); background:var(--red-pale); }
.ath.sel .nm::after{ content:" 選択中"; color:var(--red); font-size:.8rem; }
.selbar{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-top:10px;
  padding:10px 14px; background:var(--blue-pale); border-radius:12px; }
/* 一覧表のタイム入力欄 */
.rowtime{ font-family:"M PLUS 1",sans-serif; font-variant-numeric:tabular-nums;
  font-size:1.35rem; font-weight:800; min-height:56px; width:150px;
  border:2.5px solid var(--line); border-radius:10px; padding:6px 10px; text-align:right; }
.rowtime.ok{ border-color:var(--green); background:#F2FBF5; }
.rowtime.bad{ border-color:var(--red); background:var(--red-pale); }
.rowdone{ color:var(--green); font-weight:700; }

/* ---------- 入力の進みぐあい ---------- */
.steps{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.step{ padding:8px 16px; border-radius:999px; background:var(--white); border:2px solid var(--line);
  color:var(--gray); font-weight:700; font-size:.92rem; }
.step.now{ background:var(--red); border-color:var(--red); color:var(--white); }
.step.done{ background:var(--blue-pale); border-color:var(--blue); color:var(--blue); }

/* ---------- テンキー ---------- */
.timeview{
  font-size:4.2rem; text-align:center; letter-spacing:.03em; font-weight:800;
  background:var(--blue-pale); border:3px solid var(--blue); border-radius:16px;
  padding:14px 10px; margin-bottom:16px; min-height:110px;
}
.timeview .ph{ color:var(--gray); font-size:1.05rem; font-weight:400; font-family:"BIZ UDPGothic",sans-serif; }
.pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:520px; margin:0 auto; }
.key{
  min-height:88px; font-size:2rem; font-weight:800; border-radius:14px;
  border:2.5px solid var(--line); background:var(--white); cursor:pointer;
  font-family:"M PLUS 1",sans-serif;
}
.key:hover{ background:var(--blue-pale); }
.key.fn{ font-size:1.1rem; font-family:"BIZ UDPGothic",sans-serif; color:var(--gray); }
.key:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.padwrap .btn.big{ width:100%; max-width:520px; margin:18px auto 0; display:block; }

/* ---------- 電光掲示板 (確認画面) ---------- */
.board{
  background:var(--blue-deep); border-radius:20px; padding:34px 26px; text-align:center;
  color:var(--white); border:6px solid var(--blue);
}
.board .who{ font-size:1.5rem; font-weight:700; }
.board .what{ font-size:1.15rem; color:#9FC3F0; margin-top:4px; }
.board .time{ font-size:5.2rem; font-weight:800; color:var(--gold); letter-spacing:.04em; margin:10px 0 4px; }
.board .cmp{ font-size:1.1rem; margin-top:6px; }
.board .cmp .up{ color:#FF8A80; font-weight:800; }
.board .cmp .down{ color:#9FC3F0; }
.confirmbtns{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:22px; }

/* ---------- 表 ---------- */
table{ width:100%; border-collapse:collapse; background:var(--white); }
th{ background:var(--blue); color:var(--white); font-size:.95rem; padding:10px 12px; text-align:left; position:sticky; top:0; }
td{ padding:10px 12px; border-bottom:1.5px solid var(--line); font-size:1.02rem; }
tr.rank1 td{ background:#FFF6DA; font-weight:700; }
tr.rank2 td{ background:#EEF3F8; font-weight:700; }
tr.rank3 td{ background:#F9EDE2; font-weight:700; }
.medal{ display:inline-block; min-width:2.1em; text-align:center; border-radius:8px; padding:2px 6px;
  color:var(--white); font-weight:800; margin-right:6px; }
.medal.m1{ background:var(--gold); } .medal.m2{ background:var(--silver); } .medal.m3{ background:var(--bronze); }
.pbtag{ color:var(--white); background:var(--red); border-radius:8px; padding:2px 8px; font-size:.85rem; font-weight:700; }
.tablewrap{ max-height:560px; overflow:auto; border:1.5px solid var(--line); border-radius:12px; }

/* ---------- グラフ ---------- */
.chartbox{ background:var(--white); border:1.5px solid var(--line); border-radius:16px; padding:18px; }
.legendline{ display:flex; gap:22px; flex-wrap:wrap; margin-top:10px; font-size:.95rem; font-weight:700; }
.legendline .sw{ display:inline-block; width:34px; height:0; border-top:4px dashed; vertical-align:middle; margin-right:6px; }

/* ---------- そのほか ---------- */
.okmsg{ background:#E8F6EE; border:2.5px solid var(--green); color:var(--green);
  border-radius:14px; padding:18px; font-size:1.2rem; font-weight:700; text-align:center; }
.errmsg{ background:var(--red-pale); border:2.5px solid var(--red); color:var(--red);
  border-radius:14px; padding:16px; font-weight:700; }
.loading{ text-align:center; color:var(--gray); padding:30px; font-size:1.05rem; }
.visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
/* ボタンを押したときの灰色のちらつきを消し、押しやすくする */
button{ -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
@media (max-width:640px){
  html{ font-size:16px; }
  header{ padding:12px 14px 10px; }
  .brand img.logo{ height:46px; }
  main{ padding:14px 12px 60px; }
  .tabs{ padding:12px 12px 0; gap:8px; }
  .tab{ font-size:.95rem; min-height:56px; padding:4px 2px; }
  .modes{ grid-template-columns:repeat(2,1fr); gap:8px; }
  .mode{ min-height:56px; font-size:.98rem; }
  .card{ padding:14px; border-radius:12px; }
  .stack{ gap:8px; }
  .btn{ min-height:54px; padding:8px 14px; font-size:1rem; }
  .btn.big{ min-height:62px; font-size:1.12rem; padding:10px 18px; }
  label.fld{ width:100%; }
  select,input[type="text"],input[type="date"],input[type="password"]{ width:100%; }
  .timeview{ font-size:3rem; min-height:88px; }
  .key{ min-height:72px; }
  .board{ padding:22px 12px; }
  .board .time{ font-size:3.2rem; }
  .athlist{ grid-template-columns:1fr 1fr; }
  th,td{ padding:8px 8px; font-size:.92rem; }
  .tablewrap{ max-height:70vh; }
}
/* iPadの縦向きなど中間サイズ */
@media (min-width:641px) and (max-width:1024px){
  .modes{ grid-template-columns:repeat(3,1fr); }
}
</style>
</head>

/* ============================================================
   タイムの読み書き (文字列 と 秒数 の変換)
============================================================ */
// "1:54.83" や "1.54.83" や "26.10" を秒数にする。読めなければ null
function toSec(str){
  if(!str) return null;
  const s = String(str).trim();
  let m = s.match(/^(\d+)[:.](\d{1,2})\.(\d{1,2})$/);   // 分:秒.コンマ
  if(m) return Number(m[1])*60 + Number(m[2]) + Number(('0.'+m[3]));
  m = s.match(/^(\d{1,2})\.(\d{1,2})$/);                 // 秒.コンマ
  if(m) return Number(m[1]) + Number('0.'+m[2]);
  return null;
}
// 秒数を "1:54.83" の形にもどす
function toStr(sec){
  if(sec == null) return '';
  const cs = Math.round(sec*100);
  const m = Math.floor(cs/6000);
  const s = Math.floor((cs%6000)/100);
  const c = cs%100;
  const pad = n => String(n).padStart(2,'0');
  return m>0 ? m+':'+pad(s)+'.'+pad(c) : s+'.'+pad(c);
}
// テンキーで押した数字の列 (例 "15483") を "1:54.83" にする
function digitsToTime(d){
  if(d.length===0) return '';
  const p = d.padStart(5,'0');
  const cs = p.slice(-2);
  const ss = p.slice(-4,-2);
  const mm = p.slice(0,-4).replace(/^0+/,'');
  return (mm? mm+':' : '') + ss + '.' + cs;
}
function digitsValid(d){
  if(d.length<3 || d.length>6) return false;
  const p = d.padStart(5,'0');
  return Number(p.slice(-4,-2)) < 60;   // 秒は59まで
}
const esc = t => String(t).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============================================================
   サーバーとのやりとり
============================================================ */
async function apiGet(action){
  const res = await fetch(GAS_URL + '?action=' + action);
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}
async function apiSave(payload){
  // 保存でデータが変わるので、おぼえていた初期データは捨てて次回読み直す
  localStorage.removeItem('cust_init_cache');
  const res = await fetch(GAS_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },  // GASの決まりごと
    body: JSON.stringify(Object.assign({action:'save'}, payload))
  });
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}
async function loadInit(){
  if(INIT) return INIT;
  // 10分以内に開き直したときは、おぼえておいたデータで即はじめる
  try{
    const c = JSON.parse(localStorage.getItem('cust_init_cache')||'null');
    if(c && Date.now()-c.at < 10*60*1000){ INIT = c.data; }
  }catch(e){}
  if(!INIT){
    INIT = await apiGet('init');
    try{ localStorage.setItem('cust_init_cache', JSON.stringify({at:Date.now(), data:INIT})); }catch(e){}
  }
  // 設定画面で種目が登録されていれば、そちらを使う
  if(INIT.events && INIT.events.length) STROKES = INIT.events;
  return INIT;
}
async function loadRecords(force){
  if(DATA && !force) return DATA;
  // 一度読んだら10分間は覚えておく (localStorage)
  try{
    if(!force){
      const c = JSON.parse(localStorage.getItem('cust_rec_cache')||'null');
      if(c && Date.now()-c.at < 10*60*1000){ DATA = c.data; return DATA; }
    }
  }catch(e){}
  DATA = await apiGet('records');
  try{ localStorage.setItem('cust_rec_cache', JSON.stringify({at:Date.now(), data:DATA})); }catch(e){}
  return DATA;
}
// 記録の配列を、あつかいやすい形にひらく
function rec(r){
  const mt = DATA.meets[r[0]];
  return { meet:mt, name:r[1], sex:r[2], stroke:r[3], dist:r[4],
           time:r[5], best:r[6], pb:r[7]===1,
           sec:toSec(r[5]), stamp:mt.year*100+mt.month };
}

/* ============================================================
   選手を探す共通部品
   学年・男女・五十音・文字検索(音声入力もOK)で絞り込みます
============================================================ */
function makeFinder(container, onPick, multiDone, preselected){
  // 学年・男女・行は複数選べる(空っぽのときは絞り込みなし)
  const state = { grade:new Set(), sex:new Set(), row:new Set(), text:'' };
  const grades = [...new Set(INIT.roster.map(r=>r.grade).filter(Boolean))];

  container.innerHTML = `
    <div class="finder">
      <div class="chips" data-k="grade" role="group" aria-label="学年で絞る"></div>
      <div class="chips" data-k="sex" role="group" aria-label="男女で絞る"></div>
      <div class="chips" data-k="row" role="group" aria-label="名前の行で絞る"></div>
      <label class="fld">名前で検索(音声入力もつかえます)
        <input type="text" data-k="text" placeholder="例: やまもと">
      </label>
      ${multiDone? `<div class="selbar">
        <span class="selcount" style="font-weight:700">選択中: 0人</span>
        <button type="button" class="btn red solid" data-k="done" disabled>選んだ選手で一覧を作る</button>
      </div>`:''}
      <div class="athlist" role="list"></div>
    </div>`;
  const selected = new Map();
  (preselected||[]).forEach(p=>selected.set(p.name, p));
  function paintSel(){
    if(!multiDone) return;
    container.querySelector('.selcount').textContent = '選択中: '+selected.size+'人';
    container.querySelector('[data-k="done"]').disabled = selected.size===0;
  }
  if(multiDone){
    container.querySelector('[data-k="done"]').onclick = ()=>multiDone(Array.from(selected.values()));
  }

  function chips(k, items){
    const box = container.querySelector(`.chips[data-k="${k}"]`);
    box.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'chip on'; all.textContent = 'すべて'; all.type='button';
    all.onclick = ()=>{ state[k].clear(); render(); };
    box.appendChild(all);
    items.forEach(v=>{
      const b = document.createElement('button');
      b.className = 'chip'; b.type='button';
      b.textContent = v.label!==undefined? v.label : v;
      const val = v.value!==undefined? v.value : v;
      // 押すたびに追加と取り消しが切り替わる
      b.onclick = ()=>{
        if(state[k].has(val)) state[k].delete(val);
        else state[k].add(val);
        render();
      };
      b.dataset.v = val;
      box.appendChild(b);
    });
  }
  chips('grade', grades);
  chips('sex', ['男','女']);
  const hasKana = INIT.roster.some(r=>r.kana);
  if(hasKana){
    chips('row', GOJUON.map(g=>({label:g[0]+'行', value:g[0]})));
  } else {
    container.querySelector('.chips[data-k="row"]').style.display = 'none';
  }
  container.querySelector('input[data-k="text"]').addEventListener('input', e=>{
    state.text = e.target.value.trim(); render();
  });
  paintSel();

  function kanaRow(kana){
    const c = (kana||'')[0];
    for(const g of GOJUON){ if(g[1].indexOf(c)>=0) return g[0]; }
    return '';
  }
  function render(){
    // チップの見た目を今の状態にそろえる(すべて=なにも選んでいないとき)
    ['grade','sex','row'].forEach(k=>{
      container.querySelectorAll(`.chips[data-k="${k}"] .chip`).forEach((b,i)=>{
        const on = i===0 ? state[k].size===0 : state[k].has(b.dataset.v);
        b.classList.toggle('on', on);
      });
    });
    const list = container.querySelector('.athlist');
    let people = INIT.roster.slice();
    if(state.grade.size) people = people.filter(p=>state.grade.has(p.grade));
    if(state.sex.size)   people = people.filter(p=>Array.from(state.sex).some(v=>(p.sex||'').startsWith(v)));
    if(state.row.size)   people = people.filter(p=>state.row.has(kanaRow(p.kana)));
    if(state.text)  people = people.filter(p=>p.name.includes(state.text)||p.kana.includes(state.text));
    people.sort((a,b)=>(a.kana||a.name).localeCompare(b.kana||b.name,'ja'));
    list.innerHTML = '';
    if(people.length===0){
      list.innerHTML = '<div class="hint">この条件の選手はいません。条件を緩めてください。</div>';
      return;
    }
    // 一人だけ選ぶ画面では、名前のボタンではなくプルダウンで選ぶ
    if(!multiDone){
      const lab = document.createElement('label');
      lab.className = 'fld';
      lab.style.cssText = 'max-width:460px; grid-column:1/-1;';
      lab.textContent = '選手を選ぶ';
      const sel = document.createElement('select');
      const head = document.createElement('option');
      head.value = '';
      head.textContent = `選手を選んでください (${people.length}人)`;
      sel.appendChild(head);
      people.forEach((p,i)=>{
        const o = document.createElement('option');
        o.value = i;
        const sub = [p.kana, [p.grade, p.sex].filter(Boolean).join('・')].filter(Boolean).join(' ');
        o.textContent = p.name + (sub? '　'+sub : '');
        sel.appendChild(o);
      });
      sel.onchange = ()=>{ if(sel.value!=='') onPick(people[Number(sel.value)]); };
      lab.appendChild(sel);
      list.appendChild(lab);
      return;
    }
    people.forEach(p=>{
      const b = document.createElement('button');
      b.className='ath'; b.type='button'; b.setAttribute('role','listitem');
      const sub = [p.kana, [p.grade, p.sex].filter(Boolean).join('・')].filter(Boolean).join('　');
      b.innerHTML = `<span class="nm">${esc(p.name)}</span><span class="kn">${esc(sub)}</span>`;
      if(multiDone){
        if(selected.has(p.name)) b.classList.add('sel');
        b.setAttribute('aria-pressed', selected.has(p.name));
        b.onclick = ()=>{
          if(selected.has(p.name)){ selected.delete(p.name); b.classList.remove('sel'); }
          else { selected.set(p.name, p); b.classList.add('sel'); }
          b.setAttribute('aria-pressed', selected.has(p.name));
          paintSel();
        };
      } else {
        b.onclick = ()=>onPick(p);
      }
      list.appendChild(b);
    });
  }
  render();
}

function drawSteps(now){
  const box = document.getElementById('inSteps');
  box.innerHTML = '';
  STEP_NAMES.forEach((nm,i)=>{
    const d = document.createElement('span');
    d.className = 'step' + (i===now?' now': i<now?' done':'');
    d.textContent = (i+1)+'. '+nm;
    box.appendChild(d);
  });
}

  const nSel = document.getElementById('meetName');

    ySel.innerHTML = '';

      const o = document.createElement('option');

    });

    const y = Number(ySel.value);
    const months = [...new Set(INIT.meets.filter(m=>m.year===y).map(m=>m.month).filter(m=>m>0))]
      .sort((a,b)=>b-a);
    mSel.innerHTML = '<option value="0">すべての月</option>';
    months.forEach(mo=>{
      const o = document.createElement('option');
      o.value = mo; o.textContent = mo+'月';
      mSel.appendChild(o);
    });
  }
  function fillNames(){
    const y = Number(ySel.value);
    const mo = Number(mSel.value);
    const hits = INIT.meets.filter(m=>m.year===y && (mo===0 || m.month===mo));
    nSel.innerHTML = '<option value="">試合を選んでください</option>';

      o.value = INIT.meets.indexOf(m);
      o.textContent = `${m.month}月 ${m.meet} ${m.course||''}${m.ref?'(参考)':''}`;
      nSel.appendChild(o);

      nSel.innerHTML = '<option value="">この年月の試合はありません</option>';

  ySel.onchange = ()=>{ fillMonths(); fillNames(); };
  mSel.onchange = fillNames;

    const m = INIT.meets[Number(nSel.value)];
    IN.meet = m.meet;
    IN.course = m.course || '長水路';
    stepEvent();
  };
  fillYears(); fillMonths(); fillNames();

// その選手・種目のいちばん速い記録を探す(ベスト比較用)
function findBest(name, stroke, dist, course){
  if(!DATA) return null;
  let best = null;
  DATA.records.map(rec).forEach(r=>{
    if(r.name!==name || r.stroke!==stroke || r.dist!==dist) return;
    if(course && r.meet.course && r.meet.course!==course) return;
    if(r.sec!=null && (best==null || r.sec<best)) best = r.sec;
  });
  return best;
}

  body.innerHTML = `

      <div class="stack" style="align-items:end; margin-bottom:10px">
        <label class="fld">この種目の実施日
          <input type="date" id="btDate" value="${IN.date || new Date().toISOString().slice(0,10)}">
        </label>
      </div>
      <p class="hint">数字だけを打ちます。例: 1分54秒83 は 15483。区切りは自動で入ります。日本語入力のままの全角数字でも大丈夫です。改行キーで次の選手に移ります。空欄の選手は保存されません。</p>
      <div class="tablewrap"><table id="batchTable">
        <tr><th>選手</th><th>これまでのベスト</th><th>今回の記録</th><th></th><th></th></tr>
        ${rowsHtml}
      </table></div>
      <div class="stack" style="margin-top:16px">
        <button class="btn big red solid" onclick="saveBatchGo()">まとめて保存する</button>
        <button class="btn" onclick="captureTable(); stepAthletes()">選手を追加・削除する</button>
        <button class="btn ghost" onclick="stepEvent()">種目に戻る</button>
      </div>
      <div id="btMsg" style="margin-top:12px"></div>
    </div>`;
  // タイム欄: 数字だけを受け付けて、打つそばから 1:54.83 の形に整える
  // 日本語入力がオンで全角の１５４８３になっても、自動で半角に直します
  function formatRow(inp){
    const half = inp.value.replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    const d = half.replace(/[^0-9]/g,'').replace(/^0+/,'').slice(0,6);
    inp.dataset.d = d;
    inp.value = d? digitsToTime(d) : '';
    inp.classList.remove('ok','bad');
    if(d) inp.classList.add(digitsValid(d)? 'ok' : 'bad');
  }
  document.querySelectorAll('#batchTable .rowtime').forEach(inp=>{
    if(inp.dataset.d) formatRow(inp);
    inp.addEventListener('input', e=>{ if(!e.isComposing) formatRow(inp); });
    inp.addEventListener('compositionend', ()=>formatRow(inp));
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter' && !e.isComposing){
        e.preventDefault();
        // その時点で入力できる欄の中から、次の欄へ移る
        const list = Array.from(document.querySelectorAll('#batchTable .rowtime:not(:disabled)'));
        const next = list[list.indexOf(inp)+1];
        if(next) next.focus();
      }
    });
  });
  // 外すボタン: タイムを保ったまま、その選手だけ一覧から外す
  document.querySelectorAll('#batchTable .rowdel').forEach(btn=>{
    btn.onclick = ()=>{
      const tr = btn.closest('tr');
      const name = tr.dataset.name;
      captureTable();
      IN.list = IN.list.filter(p=>p.name!==name);
      delete IN.times[name];
      stepTable();
    };
  });
  document.getElementById('btDate').onchange = e=>{ IN.date = e.target.value; };
  const first = document.querySelector('#batchTable .rowtime:not(:disabled)');
  if(first) first.focus();
}

// 表に打ち込んだタイムを覚えておく(選手の追加・削除で表を作り直すときに使う)
function captureTable(){
  document.querySelectorAll('#batchTable tr[data-name]').forEach(tr=>{
    const name = tr.dataset.name;
    const d = tr.querySelector('.rowtime').dataset.d || '';
    if(d) IN.times[name] = d; else delete IN.times[name];
  });
}

async function saveBatchGo(){
  const msg = document.getElementById('btMsg');
  const rows = Array.from(document.querySelectorAll('#batchTable tr[data-i]'));
  const entries = [];
  const badNames = [];
  rows.forEach(tr=>{
    const p = IN.list[Number(tr.dataset.i)];
    const inp = tr.querySelector('.rowtime');
    const d = inp.dataset.d || '';
    if(tr.querySelector('.stcell').textContent.indexOf('保存済み')>=0) return; // 二重保存を防ぐ
    if(!d) return;
    if(!digitsValid(d)){ badNames.push(p.name); return; }
    entries.push({ p, tr, time: digitsToTime(d) });
  });
  if(badNames.length>0){
    msg.innerHTML = `<div class="errmsg">タイムの形がおかしい選手がいます: ${esc(badNames.join('、'))}。秒は59までです。</div>`;
    return;
  }
  if(entries.length===0){
    msg.innerHTML = '<div class="errmsg">保存する記録がありません。タイムを入れてください。</div>';
    return;
  }
  if(!confirm(entries.length+'人の記録を '+IN.meet+' の '+IN.dist+'m'+strokeJa(IN.stroke)+' として保存します。よろしいですか。')) return;
  msg.innerHTML = '<div class="loading">'+entries.length+'件を保存しています…</div>';
  try{
    IN.date = document.getElementById('btDate').value;
    await apiSave({
      action:'saveBatch', meet: IN.meet, course: IN.course, date: IN.date,
      records: entries.map(e=>({ name:e.p.name, event: IN.dist+IN.stroke, time:e.time }))
    });
    localStorage.removeItem('cust_rec_cache');
    entries.forEach(e=>{
      const best = findBest(e.p.name, IN.stroke, IN.dist, IN.course);
      const sec = toSec(e.time);
      const pb = (best!=null && sec!=null && sec<best);
      IN.saved[e.p.name] = true;
      IN.times[e.p.name] = e.tr.querySelector('.rowtime').dataset.d || '';
      e.tr.querySelector('.stcell').innerHTML =
        '<span class="rowdone">保存済み</span>' + (pb? ' <span class="pbtag">ベスト更新</span>':'');
      e.tr.querySelector('.rowtime').disabled = true;
      const del = e.tr.querySelector('.rowdel');
      if(del) del.remove();
    });
    msg.innerHTML = `<div class="okmsg">${entries.length}件を保存しました。</div>
      <div class="stack" style="margin-top:12px; justify-content:center">
        <button class="btn big solid" onclick="IN.stroke=null; IN.dist=null; stepEvent()">同じ大会の別の種目へ</button>
        <button class="btn big" onclick="captureTable(); stepAthletes()">同じ種目で選手を追加</button>
        <button class="btn big ghost" onclick="stepMeet()">最初に戻る</button>
      </div>`;
  }catch(err){
    msg.innerHTML = '<div class="errmsg">保存できませんでした: '+esc(err.message)+'</div>';
  }
}

function viewMeet(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card">
      <h2>試合で探す</h2>
      <p class="hint">年と月を選ぶと、その年月の試合が試合名の欄に並びます。</p>
      <div class="stack" style="align-items:end">
        <label class="fld">年<select id="vmYear"></select></label>
        <label class="fld">月<select id="vmMonth"></select></label>
        <label class="fld" style="flex:1; min-width:260px">試合名<select id="vmName"></select></label>
      </div>
      <div id="meetOut" style="margin-top:16px"></div>
    </div>`;

  const ySel = document.getElementById('vmYear');
  const mSel = document.getElementById('vmMonth');
  const nSel = document.getElementById('vmName');
  const years = [...new Set(DATA.meets.map(m=>m.year).filter(y=>y>0))].sort((a,b)=>b-a);

  function fillYears(){
    ySel.innerHTML = '';
    years.forEach(y=>{
      const o = document.createElement('option');
      o.value = y; o.textContent = y+'年';
      ySel.appendChild(o);
    });
  }
  function fillMonths(){
    const y = Number(ySel.value);
    const months = [...new Set(DATA.meets.filter(m=>m.year===y).map(m=>m.month).filter(m=>m>0))]
      .sort((a,b)=>b-a);
    mSel.innerHTML = '<option value="0">すべての月</option>';
    months.forEach(mo=>{
      const o = document.createElement('option');
      o.value = mo; o.textContent = mo+'月';
      mSel.appendChild(o);
    });
  }
  function fillNames(){
    const y = Number(ySel.value);
    const mo = Number(mSel.value);
    const hits = DATA.meets
      .map((m,i)=>({m,i}))
      .filter(x=>x.m.year===y && (mo===0 || x.m.month===mo))
      .sort((a,b)=>(b.m.year*100+b.m.month)-(a.m.year*100+a.m.month));
    nSel.innerHTML = '';
    hits.forEach(x=>{
      const o = document.createElement('option');
      o.value = x.i;
      o.textContent = `${x.m.month}月 ${x.m.meet} ${x.m.course||''}${x.m.ref?'(参考)':''}`;
      nSel.appendChild(o);
    });
    if(hits.length===0){
      nSel.innerHTML = '<option value="">この年月の試合はありません</option>';
      document.getElementById('meetOut').innerHTML = '';
      return;
    }
    draw();  // いちばん新しい試合を自動で表示する
  }
  function draw(){
    if(nSel.value==='') return;
    const idx = Number(nSel.value);
    const rows = DATA.records.map(rec).filter(r=>DATA.meets.indexOf(r.meet)===idx);
    const out = document.getElementById('meetOut');
    if(rows.length===0){ out.innerHTML = '<p class="hint">この大会の記録はありません。</p>'; return; }
    // 種目ごとにまとめる
    const groups = {};
    rows.forEach(r=>{
      const k = r.dist + 'm' + strokeJa(r.stroke) + '・' + r.sex;
      (groups[k] = groups[k]||[]).push(r);
    });
    let html = `<p class="hint">${rows.length}件の記録。ベスト更新は赤い印がつきます。</p>`;
    Object.keys(groups).forEach(k=>{
      const g = groups[k].sort((a,b)=>(a.sec??9e9)-(b.sec??9e9));
      html += `<h3 style="margin:16px 0 6px; font-size:1.1rem; color:var(--blue)">${esc(k)}</h3>
        <div class="tablewrap"><table><tr><th>名前</th><th>記録</th><th>大会前ベスト</th><th></th></tr>`;
      g.forEach(r=>{
        html += `<tr><td>${esc(r.name)}</td><td class="num">${esc(r.time)}${recordBadges(r.sec, r.stroke, r.dist, r.sex, r.meet.course)}</td><td class="num">${esc(r.best)}</td>
          <td>${r.pb?'<span class="pbtag">ベスト更新</span>':''}</td></tr>`;
      });
      html += '</table></div>';
    });
    out.innerHTML = html;
  }
  ySel.onchange = ()=>{ fillMonths(); fillNames(); };
  mSel.onchange = fillNames;
  nSel.onchange = draw;
  fillYears(); fillMonths(); fillNames();
}

/* ============================================================
   標準記録のライン (赤=日本選手権 / 緑=インカレ)
   をグラフに描きこむ道具
============================================================ */
const stdLinePlugin = {
  id: 'stdLines',
  afterDatasetsDraw(chart){
    const lines = chart.options.stdLines || [];
    const {ctx, chartArea, scales} = chart;
    lines.forEach((L, i)=>{
      const scale = L.axis==='x' ? scales.x : scales.y;
      if(!scale) return;
      const px = scale.getPixelForValue(L.value);
      ctx.save();
      ctx.strokeStyle = L.color; ctx.lineWidth = 3; ctx.setLineDash([10,7]);
      ctx.beginPath();
      if(L.axis==='x'){
        if(px<chartArea.left||px>chartArea.right){ ctx.restore(); return; }
        ctx.moveTo(px, chartArea.top); ctx.lineTo(px, chartArea.bottom);
      } else {
        if(px<chartArea.top||px>chartArea.bottom){ ctx.restore(); return; }
        ctx.moveTo(chartArea.left, px); ctx.lineTo(chartArea.right, px);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = L.color;
      ctx.font = "700 15px 'BIZ UDPGothic', sans-serif";
      if(L.axis==='x'){
        // ラベルは棒と重ならないよう、グラフの上の余白に出す
        const y = chartArea.top - 10 - (lines.length - 1 - i) * 22;
        const rightSide = px > (chartArea.left + chartArea.right) / 2;
        ctx.textAlign = rightSide ? 'right' : 'left';
        ctx.fillText(L.label, rightSide ? px - 8 : px + 8, Math.max(y, 14));
      } else {
        const y2 = px - 8 - i*20;   // 縦グラフ用も同じくずらす
        ctx.textAlign = 'left';
        ctx.fillText(L.label, chartArea.left + 8, y2);
      }
      ctx.restore();
    });
  }
};
Chart.register(stdLinePlugin);

// 棒グラフのそれぞれの棒に、記録のタイムを書きこむ道具
const barValuePlugin = {
  id: 'barValues',
  afterDatasetsDraw(chart){
    if(!chart.options.barValues) return;
    const {ctx, chartArea} = chart;
    const meta = chart.getDatasetMeta(0);
    ctx.save();
    ctx.font = "800 16px 'M PLUS 1', sans-serif";
    meta.data.forEach((bar, i)=>{
      const v = chart.data.datasets[0].data[i];
      const label = toStr(v);
      const barWidth = bar.x - chartArea.left;
      if(barWidth > 95){
        // 棒が長ければ、棒の中の右はしに白い文字で
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'right';
        ctx.fillText(label, bar.x - 10, bar.y + 6);
      } else {
        // 棒が短ければ、棒の外がわの右に濃い文字で
        ctx.fillStyle = '#14273F';
        ctx.textAlign = 'left';
        ctx.fillText(label, bar.x + 8, bar.y + 6);
      }
    });
    ctx.restore();
  }
};
Chart.register(barValuePlugin);

// 折れ線グラフのそれぞれの点に、記録のタイムを書きこむ道具
const pointValuePlugin = {
  id: 'pointValues',
  afterDatasetsDraw(chart){
    if(!chart.options.pointValues) return;
    const {ctx, chartArea} = chart;
    const meta = chart.getDatasetMeta(0);
    const data = chart.data.datasets[0].data;
    const bestSec = Math.min.apply(null, data);
    ctx.save();
    meta.data.forEach((pt, i)=>{
      const v = data[i];
      const isBest = v === bestSec;
      ctx.font = (isBest? "800 17px" : "700 15px") + " 'M PLUS 1', sans-serif";
      ctx.fillStyle = isBest ? '#E5372E' : '#14273F';
      ctx.textAlign = 'center';
      // ふだんは点の上に。上端に近いときは点の下に出す
      let y = pt.y - 14;
      if(y < chartArea.top + 18) y = pt.y + 28;
      // 左右の点は、グラフの外にはみ出さないように内側へよせる
      let x = pt.x;
      if(x < chartArea.left + 40){ ctx.textAlign = 'left'; x = pt.x + 6; }
      if(x > chartArea.right - 40){ ctx.textAlign = 'right'; x = pt.x - 6; }
      const label = toStr(v) + (isBest ? ' ベスト' : '');
      ctx.fillText(label, x, y);
    });
    ctx.restore();
  }
};
Chart.register(pointValuePlugin);
let activeChart = null;
function newChart(canvas, config){
  if(activeChart){ activeChart.destroy(); }
  activeChart = new Chart(canvas, config);
  return activeChart;
}
// 記録の推移グラフを描く共通の部品 (名前で探すとグラフの両方から使う)
function renderProgress(canvasId, titleId, boxId, p, stroke, dist, course){
  const rows = DATA.records.map(rec).filter(r=>
    r.name===p.name && r.stroke===stroke && r.dist===dist &&
    (r.meet.course||'長水路')===course && r.sec!=null
  ).sort((a,b)=>a.stamp-b.stamp);
  if(rows.length===0) return;
  const sex = (INIT.roster.find(x=>x.name===p.name)||{}).sex==='女'?'女子':'男子';
  const std = stdFor(stroke, dist, sex, course);
  const lines = stdLineList(std, 'y');
  const bestSec = Math.min(...rows.map(r=>r.sec));
  document.getElementById(boxId).hidden = false;
  document.getElementById(titleId).textContent =
    `${p.name} さんの ${dist}m${strokeJa(stroke)} (${course}) の推移`;
  const secs = rows.map(r=>r.sec).concat(lines.map(L=>L.value));
  const min = Math.min(...secs), max = Math.max(...secs), padPx=(max-min)*0.16||1;
  newChart(document.getElementById(canvasId), {
    type:'line',
    data:{
      labels: rows.map(r=>`${String(r.meet.year).slice(2)}年${r.meet.month}月 ${r.meet.meet}${r.meet.ref?'(参考)':''}`),
      datasets:[{
        data: rows.map(r=>r.sec),
        borderColor:'#1663C7', borderWidth:4, tension:.25,
        pointRadius: rows.map(r=>r.sec===bestSec?9:6),
        pointBackgroundColor: rows.map(r=>r.sec===bestSec?'#E5372E':'#1663C7'),
        pointBorderColor:'#fff', pointBorderWidth:2
      }]
    },
    options:{
      responsive:true, stdLines:lines, pointValues:true,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label:c=>' '+toStr(c.parsed.y)+(rows[c.dataIndex].sec===bestSec?' (ベスト)':'') } } },
      scales:{
        y:{ reverse:true, min:min-padPx, max:max+padPx,
          title:{display:true, text:'タイム(上が速い)', font:{family:'BIZ UDPGothic', weight:'700'}},
          ticks:{ callback:v=>toStr(v), font:{family:'M PLUS 1'} } },
        x:{ ticks:{ font:{family:'BIZ UDPGothic', size:12}, maxRotation:60 } }
      }
    }
  });
  document.getElementById(boxId).scrollIntoView({behavior:'smooth'});
}

// 標準記録をさがす。標準記録シートを最優先にして、
// なければ大会シート由来の値(長水路のみ)で補う
function stdFor(stroke, dist, sex, course){
  course = course || '長水路';
  const ev = dist + stroke;
  const all = INIT.standardsAll || {};
  let japanStr = all['日本選手権_'+course+'_'+sex+'_'+ev] || null;
  // ジャパンオープンは標準記録シートに登録された年だけ表示される
  const openStr = all['ジャパンオープン_'+course+'_'+sex+'_'+ev] || null;
  const incStr = all['インカレ_'+course+'_'+sex+'_'+ev] || null;
  if(course === '長水路' && !japanStr){
    const s = (INIT.standards||{})[ev+'_'+sex];
    if(s) japanStr = s.japan || null;
  }
  return { japan:toSec(japanStr), japanStr,
           open:toSec(openStr),  openStr,
           inc:toSec(incStr),    incStr };
}
// グラフに引く標準記録のライン一式を作る (赤=日本選手権 緑=インカレ)
function stdLineList(std, axis){
  const L = [];
  if(std.japan) L.push({axis, value:std.japan, color:'#E5372E', label:'日本選手権 '+std.japanStr});
  if(std.open)  L.push({axis, value:std.open,  color:'#1663C7', label:'Jオープン '+std.openStr});
  if(std.inc)   L.push({axis, value:std.inc,   color:'#17934A', label:'インカレ '+std.incStr});
  return L;
}

function viewRank(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card redline"><h2>ランキング</h2>
      <div id="rkPick"></div>

          <span><span class="sw" style="border-color:var(--red)"></span>日本選手権 標準記録</span>
          <span><span class="sw" style="border-color:var(--blue)"></span>ジャパンオープン 標準記録</span>
          <span><span class="sw" style="border-color:var(--green)"></span>インカレ 標準記録</span>
        </div>
      </div>
      <div id="rkOut" style="margin-top:16px"></div>

  const rosterNames = new Set(INIT.roster.map(p=>p.name));
  function draw(st){
    cur = st || cur; if(!cur) return;
    const includeOB = document.getElementById('rkOB').checked;
    // 選手ごとのベストを出す
    const bestMap = {};
    DATA.records.map(rec).forEach(r=>{
      if(r.stroke!==cur.stroke || r.dist!==cur.dist || r.sex!==cur.sex) return;
      if(cur.course && (r.meet.course||'')!==cur.course) return;
      if(r.sec==null) return;
      const isOB = obNames.has(r.name) || !rosterNames.has(r.name);
      if(!includeOB && isOB) return;
      if(!bestMap[r.name] || r.sec < bestMap[r.name].sec) bestMap[r.name] = r;
    });
    const ranked = Object.values(bestMap).sort((a,b)=>a.sec-b.sec).slice(0,15);
    const out = document.getElementById('rkOut');
    if(ranked.length===0){
      out.innerHTML='<p class="hint">この条件の記録はありません。</p>';
      if(activeChart) activeChart.destroy(), activeChart=null;
      return;

    // 表
    let html = `<div class="tablewrap"><table><tr><th>順位</th><th>名前</th><th>ベスト</th><th>出した大会</th></tr>`;
    ranked.forEach((r,i)=>{
      const cls = i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
      const medal = i<3? `<span class="medal m${i+1}">${i+1}位</span>` : `${i+1}位`;

        <td>${r.meet.year}年${r.meet.month}月 ${esc(r.meet.meet)}</td></tr>`;
    });
    out.innerHTML = html + '</table></div>';
    // 横棒グラフ + 標準記録の縦ライン
    const std = stdFor(cur.stroke, cur.dist, cur.sex, cur.course);
    const colors = ranked.map((_,i)=>
      i===0?'#F5B301': i===1?'#94A7BC': i===2?'#C77B3F':'#1663C7');
    const lines = stdLineList(std, 'x');
    const secs = ranked.map(r=>r.sec).concat(lines.map(L=>L.value));
    const min = Math.min(...secs), max = Math.max(...secs), padPx=(max-min)*0.08||1;
    newChart(document.getElementById('rkChart'), {
      type:'bar',
      data:{ labels: ranked.map((r,i)=>(i+1)+'位 '+r.name),
        datasets:[{ data: ranked.map(r=>r.sec), backgroundColor: colors, borderRadius:8 }] },
      options:{
        indexAxis:'y', responsive:true, stdLines:lines, barValues:true,
        layout:{ padding:{ top: 10 + lines.length*22 } },
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{ label:c=>' '+toStr(c.parsed.x) } } },
        scales:{
          x:{ min:min-padPx, max:max+padPx,
            title:{display:true, text:'タイム(左が速い)', font:{family:'BIZ UDPGothic', weight:'700'}},
            ticks:{ callback:v=>toStr(v), font:{family:'M PLUS 1'} } },
          y:{ ticks:{ font:{family:'BIZ UDPGothic', size:14, weight:'700'} } }

/* ============================================================
   閲覧: 中京歴代ランキング
   昔の記録を手で打ち込め、現役が上回ると自動で順位が入れ替わります
============================================================ */
function viewLegend(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card redline"><h2>中京歴代記録</h2>
      <div id="lgPick"></div>
      <p class="hint" style="margin-top:10px">1957年からの歴代記録の歴代トップ10です。現役の部員が上回ったときだけ、自動で順位が入れ替わります。OB・OGの今の記録では書き換わりません。</p>
      <div id="lgOut" style="margin-top:12px"></div>
    </div>
    <div class="card"><h2>歴代記録を打ち込む(指導者・スタッフ用)</h2>
      <p class="hint">今のスプレッドシートに入っていない、昔の選手の記録をここから登録できます。上で選んでいる種目・男女・水路に登録されます。</p>
      <div class="stack" style="align-items:end">
        <label class="fld">名前<input type="text" id="lgName" placeholder="例: 中京太郎"></label>
        <label class="fld">タイム<input type="text" id="lgTime" placeholder="例: 15483 か 1:54.83" inputmode="numeric"></label>
        <label class="fld">年(わかれば)<input type="text" id="lgYear" placeholder="例: 2015" inputmode="numeric" style="max-width:140px"></label>
        <button class="btn red solid" onclick="saveLegacy()">この記録を登録する</button>
      </div>
      <div id="lgMsg" style="margin-top:10px"></div>
    </div>`;
  let cur = null;
  // 自動の入れ替えは現役の部員だけ。OB・OGや名簿にいない人の
  // 今の大会記録では、歴代記録は書き換わらない
  const obNames = new Set(INIT.roster.filter(p=>p.grade==='OB'||p.grade==='OG').map(p=>p.name));
  const activeNames = new Set(INIT.roster.filter(p=>p.grade && p.grade!=='OB' && p.grade!=='OG').map(p=>p.name));
  eventPicker(document.getElementById('lgPick'), st=>{ cur = st; drawLegend(cur); }, true);

  function drawLegend(st){
    cur = st || cur; if(!cur) return;
    // 現役部員の大会記録: 選手ごとにいちばん速いもの
    const bestMap = {};
    DATA.records.map(rec).forEach(r=>{
      if(r.stroke!==cur.stroke || r.dist!==cur.dist || r.sex!==cur.sex) return;
      if((r.meet.course||'')!==cur.course) return;
      if(r.sec==null) return;
      if(obNames.has(r.name) || !activeNames.has(r.name)) return;
      if(!bestMap[r.name] || r.sec < bestMap[r.name].sec){
        bestMap[r.name] = { name:r.name, sec:r.sec,
          note:`${r.meet.year}年${r.meet.month}月 ${r.meet.meet}` };
      }
    });
    // 手で打ち込んだ歴代記録も合わせる(同じ人は速いほうを残す)
    (DATA.legacy||[]).forEach(L=>{
      const m = String(L.event).match(/^(\d+)\s*(Fr|Ba|Br|Fly|IM)/);
      if(!m) return;
      if(Number(m[1])!==cur.dist || m[2]!==cur.stroke) return;
      if(L.sex!==cur.sex || L.course!==cur.course) return;
      const sec = toSec(L.time);
      if(sec==null) return;
      if(!bestMap[L.name] || sec < bestMap[L.name].sec){
        bestMap[L.name] = { name:L.name, sec:sec,
          note: (L.year? L.year+'年 ' : '') + '歴代記録として登録' };
      }
    });
    const ranked = Object.values(bestMap).sort((a,b)=>a.sec-b.sec).slice(0,10);
    const out = document.getElementById('lgOut');
    if(ranked.length===0){ out.innerHTML='<p class="hint">この条件の記録はまだありません。</p>'; return; }
    const std = stdFor(cur.stroke, cur.dist, cur.sex, cur.course);
    let html = `<div class="tablewrap"><table><tr><th>順位</th><th>名前</th><th>記録</th><th>備考</th></tr>`;
    ranked.forEach((r,i)=>{
      const cls = i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
      const medal = i<3? `<span class="medal m${i+1}">${i+1}位</span>` : `${i+1}位`;
      let badge = recordBadges(r.sec, cur.stroke, cur.dist, cur.sex, cur.course);
      if(std.japan && r.sec <= std.japan) badge += ' <span class="pbtag">日本選手権突破</span>';
      else if(std.open && r.sec <= std.open) badge += ' <span class="pbtag" style="background:var(--blue)">Jオープン突破</span>';
      else if(std.inc && r.sec <= std.inc) badge += ' <span class="pbtag" style="background:var(--green)">インカレ突破</span>';
      html += `<tr class="${cls}"><td>${medal}</td><td>${esc(r.name)}</td>
        <td class="num" style="font-weight:800">${toStr(r.sec)}${badge}</td>
        <td style="color:var(--gray); font-size:.92rem">${esc(r.note)}</td></tr>`;
    });
    out.innerHTML = html + '</table></div>';
  }

  window.saveLegacy = async function(){
    const msg = document.getElementById('lgMsg');
    const name = document.getElementById('lgName').value.trim();
    let time = document.getElementById('lgTime').value.trim();
    const year = document.getElementById('lgYear').value.trim();
    if(!name){ msg.innerHTML = '<div class="errmsg">名前を入れてください。</div>'; return; }
    // 数字だけの入力(例 15483)も受け付けて 1:54.83 の形に直す
    if(/^\d{3,6}$/.test(time) && digitsValid(time)) time = digitsToTime(time);
    const sec = toSec(time);
    if(sec==null){ msg.innerHTML = '<div class="errmsg">タイムの形が読めません。15483 のように数字だけか、1:54.83 の形で入れてください。</div>'; return; }
    msg.innerHTML = '<div class="loading">登録しています…</div>';
    try{
      await apiSave({ action:'saveLegacy', name:name, sex:cur.sex,
        event: cur.dist + cur.stroke, course: cur.course,
        time: toStr(sec), year: year });
      // 手元のデータにもすぐ足して、順位をその場で更新する
      (DATA.legacy = DATA.legacy||[]).push({ name:name, sex:cur.sex,
        event: cur.dist+cur.stroke, course:cur.course, time:toStr(sec), year:year });
      localStorage.removeItem('cust_rec_cache');
      document.getElementById('lgName').value=''; document.getElementById('lgTime').value=''; document.getElementById('lgYear').value='';
      msg.innerHTML = `<div class="okmsg">登録しました。${esc(name)} ${toStr(sec)}</div>`;
      drawLegend();
    }catch(err){
      msg.innerHTML = '<div class="errmsg">登録できませんでした: '+esc(err.message)+'</div>';
    }
  };
}

/* ============================================================
   記録のふだ (WR=世界記録 AS=アジア記録 NR=日本記録 UR=学生記録)
   タイムが記録に届いていたら、しるしを返します
============================================================ */
const RECORD_KINDS = [
  ['世界記録','WR','#0D2B52'],
  ['アジア記録','AS','#7B2D8B'],
  ['日本記録','NR','#E5372E'],
  ['学生記録','UR','#17934A']
];
function recordBadges(sec, stroke, dist, sex, course){
  if(sec==null) return '';
  const all = INIT.standardsAll || {};
  const ev = dist + stroke;
  let out = '';
  RECORD_KINDS.forEach(k=>{
    const t = toSec(all[k[0]+'_'+(course||'長水路')+'_'+sex+'_'+ev]);
    if(t!=null && sec<=t){
      out += ` <span class="pbtag" style="background:${k[2]}">${k[1]}</span>`;
    }
  });
  return out;
}

      const btn = row.querySelector('.rcname');
      btn.onclick = ()=>{
        const detail = row.nextElementSibling;
        detail.hidden = !detail.hidden;
        btn.setAttribute('aria-expanded', String(!detail.hidden));
      };
    });
  }
  ['rcKind','rcSex','rcCourse'].forEach(id=>document.getElementById(id).onchange = draw);
  draw();
}

/* ============================================================
   閲覧 6: グラフ (選手×種目の記録の推移)
   距離・種目・水路は、その選手が出場したものだけ選べます
============================================================ */
function viewGraph(autoName){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card"><h2>グラフにする選手を選ぶ</h2><div id="gFinder"></div></div>
    <div id="gStage"></div>`;
  makeFinder(document.getElementById('gFinder'), showAthlete);
  if(autoName){
    const p = INIT.roster.find(x=>x.name===autoName);
    if(p) showAthlete(p);
  }
  function showAthlete(p){
    const stage = document.getElementById('gStage');
    // 出場した種目だけをあつめる (泳法_距離_水路 → 記録の一覧)
    const evs = {};
    DATA.records.map(rec).forEach(r=>{
      if(r.name!==p.name || r.sec==null) return;
      const k = r.stroke+'_'+r.dist+'_'+(r.meet.course||'長水路');
      (evs[k]=evs[k]||[]).push(r);
    });
    const keys = Object.keys(evs);
    if(keys.length===0){
      stage.innerHTML = `<div class="card"><p class="hint">${esc(p.name)}さんの記録はまだありません。</p></div>`;
      return;
    }
    stage.innerHTML = `
      <div class="card redline"><h2>${esc(p.name)} さん どの種目をグラフにしますか</h2>
        <p class="hint">出場したことのある距離と種目だけが選べます。</p>
        <div class="stack" style="align-items:end">
          <label class="fld">距離<select id="gDist"></select></label>
          <label class="fld">種目<select id="gStroke"></select></label>
          <label class="fld">水路<select id="gCourse"></select></label>
          <span id="gCount" style="font-weight:800; font-size:1.2rem; padding-bottom:14px" aria-live="polite"></span>
        </div>
      </div>
      <div class="chartbox" id="gChartBox" hidden>
        <h2 id="gTitle" style="font-size:1.15rem; margin-bottom:8px"></h2>
        <canvas id="gChart" height="120"></canvas>
        <div class="legendline">
          <span><span class="sw" style="border-color:var(--red)"></span>日本選手権 標準記録</span>
          <span><span class="sw" style="border-color:var(--blue)"></span>ジャパンオープン 標準記録</span>
          <span><span class="sw" style="border-color:var(--green)"></span>インカレ 標準記録</span>
          <span style="color:var(--gray)">上に行くほど速いタイムです</span>
        </div>
      </div>`;

    const dSel = document.getElementById('gDist');
    const sSel = document.getElementById('gStroke');
    const cSel = document.getElementById('gCourse');
    const parts = k => { const a=k.split('_'); return {stroke:a[0], dist:Number(a[1]), course:a[2]}; };

    function fillDist(){
      const dists = [...new Set(keys.map(k=>parts(k).dist))].sort((a,b)=>a-b);
      dSel.innerHTML = '';
      dists.forEach(d=>{
        const o = document.createElement('option');
        o.value = d; o.textContent = d+'m';
        dSel.appendChild(o);
      });
    }
    function fillStroke(){
      const d = Number(dSel.value);
      const strokes = [...new Set(keys.filter(k=>parts(k).dist===d).map(k=>parts(k).stroke))];
      // 種目の並びはいつもの順 (自由形→背→平→バタフライ→個メ)
      strokes.sort((a,b)=>STROKES.findIndex(s=>s.code===a)-STROKES.findIndex(s=>s.code===b));
      sSel.innerHTML = '';
      strokes.forEach(st=>{
        const o = document.createElement('option');
        o.value = st; o.textContent = strokeJa(st);
        sSel.appendChild(o);
      });
    }
    function fillCourse(){
      const d = Number(dSel.value), st = sSel.value;
      const courses = [...new Set(keys.filter(k=>parts(k).dist===d && parts(k).stroke===st).map(k=>parts(k).course))]
        .sort();
      cSel.innerHTML = '';
      courses.forEach(cs=>{
        const o = document.createElement('option');
        o.value = cs; o.textContent = cs;
        cSel.appendChild(o);
      });
    }
    function draw(){
      const d = Number(dSel.value), st = sSel.value, cs = cSel.value;
      const rows = evs[st+'_'+d+'_'+cs] || [];
      document.getElementById('gCount').textContent = rows.length + '本';
      if(rows.length===0) return;
      renderProgress('gChart', 'gTitle', 'gChartBox', p, st, d, cs);
    }
    dSel.onchange = ()=>{ fillStroke(); fillCourse(); draw(); };
    sSel.onchange = ()=>{ fillCourse(); draw(); };
    cSel.onchange = draw;
    // 最初は、いちばん多く泳いでいる種目を自動で選んで描く
    fillDist();
    let bestKey = keys[0];
    keys.forEach(k=>{ if(evs[k].length > evs[bestKey].length) bestKey = k; });
    const bp = parts(bestKey);
    dSel.value = bp.dist;
    fillStroke();
    sSel.value = bp.stroke;
    fillCourse();
    cSel.value = bp.course;
    draw();
    if(!autoName) stage.scrollIntoView({behavior:'smooth'});
  }
}

    let res;
    if(pasted){
      // 文字の貼り付け方式(精度が高いのでこちらを優先)
      res = await apiSave({ action:'importStandardsText', password:ADMIN_PW,
        kind:kind, text:pasted });
    } else {
      // スクショ画像方式
      const b64 = await new Promise((ok, ng)=>{
        const r = new FileReader();
        r.onload = ()=>ok(String(r.result).split(',')[1]);
        r.onerror = ()=>ng(new Error('画像が読めませんでした'));
        r.readAsDataURL(file);
      });
      res = await apiSave({ action:'importStandards', password:ADMIN_PW,
        kind:kind, image:b64, mime:file.type||'image/png' });
    }
    INIT = null; localStorage.removeItem('cust_rec_cache');
    await loadInit();
    msg.innerHTML = `<div class="okmsg">${esc(kind)}の標準記録を${res.count}件登録しました。閲覧の標準記録画面で確認できます。</div>`;
    document.getElementById('asFile').value='';
    document.getElementById('asText').value='';
  }catch(err){
    msg.innerHTML = '<div class="errmsg">取り込めませんでした: '+esc(err.message)+'</div>';
  }
}

/* ============================================================
   この携帯の持ち主の登録 (マイページ)
============================================================ */
function myProfile(){
  try{ return JSON.parse(localStorage.getItem('cust_my_profile')||'null'); }catch(e){ return null; }
}
function unlinkDevice(){
  if(!confirm('この携帯の持ち主の登録を消して、登録画面に戻ります。よろしいですか。')) return;
  localStorage.removeItem('cust_my_profile');
  location.reload();
}
// 携帯に覚えている性別・生年月日が名簿に欠けていたら、自動で書きこむ
async function syncMyProfile(my){
  const p = INIT.roster.find(x=>x.name===my.name);
  if(!p) return;
  const needSex = !p.sex && my.sex;
  const needBirth = !p.birth && my.birth;
  if(!needSex && !needBirth) return;
  try{
    await apiSave({ action:'saveProfile', name:my.name,
      sex: p.sex || my.sex || '', birth: p.birth || my.birth || '' });
    if(needSex) p.sex = my.sex;
    if(needBirth) p.birth = my.birth;
    banner('名簿に足りなかった情報(男女・生年月日)を自動で登録しました。', 'ok');
  }catch(e){}
}

function showWelcome(){
  showTabBare('view');
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card redline" style="max-width:720px; margin:0 auto">
      <h2>はじめに この携帯の持ち主を登録</h2>
      <p class="hint">一度登録すると、次からこの携帯で開いた瞬間に自分の記録が表示されます。名簿に男女や生年月日が入っていない場合は、ここで入れた内容が自動で登録されます。</p>
      <div id="wFinder"></div>
      <div id="wForm" hidden style="margin-top:14px">
        <p style="font-weight:700" id="wName"></p>
        <div class="stack" style="align-items:end">
          <label class="fld">男女
            <select id="wSex"><option value="">未設定</option><option value="男">男</option><option value="女">女</option></select></label>
          <label class="fld">生年月日<input type="date" id="wBirth"></label>
          <button class="btn solid big" onclick="welcomeSave()">この携帯に登録する</button>
        </div>
      </div>
      <div id="wMsg" style="margin-top:10px"></div>
      <div style="margin-top:14px"><button class="btn ghost" onclick="skipWelcome()">登録せずに使う(コーチ・スタッフ用)</button></div>
    </div>`;
  let picked = null;
  makeFinder(document.getElementById('wFinder'), p=>{
    picked = p;
    document.getElementById('wForm').hidden = false;
    document.getElementById('wName').textContent = picked.name + ' さんですね。男女と生年月日を確認してください。';
    document.getElementById('wSex').value = p.sex || '';
    if(p.birth){
      const d = new Date(p.birth.replace(/\//g,'-'));
      if(!isNaN(d.getTime())){
        document.getElementById('wBirth').value =
          d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
    }
    document.getElementById('wForm').scrollIntoView({behavior:'smooth'});
  });
  window.welcomeSave = async function(){
    if(!picked) return;
    const sex = document.getElementById('wSex').value;
    const birth = document.getElementById('wBirth').value;
    const msg = document.getElementById('wMsg');
    msg.innerHTML = '<div class="loading">登録しています…</div>';
    try{
      await apiSave({ action:'saveProfile', name:picked.name, sex:sex, birth:birth });
      const p = INIT.roster.find(x=>x.name===picked.name);
      if(p){ p.sex = sex; p.birth = birth; }
      localStorage.setItem('cust_my_profile', JSON.stringify({ name:picked.name, sex:sex, birth:birth }));
      openMyPage(picked.name);
    }catch(err){
      msg.innerHTML = '<div class="errmsg">登録できませんでした: '+esc(err.message)+'</div>';
    }
  };
  window.skipWelcome = function(){
    localStorage.setItem('cust_my_profile', JSON.stringify({ name:'', staff:true }));
    inputBuilt = true; startInput(); showTabBare('input');
  };
}

// タブの見た目だけ切りかえる(処理は呼ばない)
function showTabBare(t){
  currentTab = t;
  document.getElementById('tabInput').setAttribute('aria-selected', t==='input');
  document.getElementById('tabView').setAttribute('aria-selected', t==='view');
  document.getElementById('tabAdmin').setAttribute('aria-selected', t==='admin');
  document.getElementById('paneInput').hidden = t!=='input';
  document.getElementById('paneView').hidden = t!=='view';
  document.getElementById('paneAdmin').hidden = t!=='admin';
}

async function openMyPage(name){
  showTabBare('view');
  currentMode = 'graph';
  document.querySelectorAll('.mode').forEach(b=>b.setAttribute('aria-selected', b.dataset.m==='graph'));
  const body = document.getElementById('viewBody');
  body.innerHTML = '<div class="loading">あなたの記録を読み込んでいます…</div>';
  try{
    await loadRecords();
    viewGraph(name);   // 本人のグラフを自動で表示する
  }catch(err){
    body.innerHTML = '<div class="errmsg">読み込めませんでした: '+esc(err.message)+'</div>';
  }
}

/* ============================================================
   お知らせ (試合の追加・アプリの更新)
============================================================ */
function banner(text, kind, btnLabel, btnFn){
  const box = document.getElementById('globalMsg');
  const div = document.createElement('div');
  div.className = kind==='ok' ? 'okmsg' : 'errmsg';
  div.style.cssText = 'margin-bottom:14px; display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; text-align:left;';
  const span = document.createElement('span');
  span.textContent = text;
  div.appendChild(span);
  if(btnLabel){
    const b = document.createElement('button');
    b.className = 'btn ' + (kind==='ok'?'solid':'red solid');
    b.style.minHeight = '48px';
    b.textContent = btnLabel;
    b.onclick = btnFn;
    div.appendChild(b);
  }
  const close = document.createElement('button');
  close.className = 'btn ghost';
  close.style.minHeight = '48px';
  close.textContent = '閉じる';
  close.onclick = ()=>div.remove();
  div.appendChild(close);
  box.appendChild(div);
}

// 新しい試合が登録されていたら知らせる
function checkMeetNews(){
  const key = 'cust_known_meets';
  const nowList = INIT.meets.map(m=>m.meet+'_'+m.year+'_'+m.month+'_'+(m.course||''));
  let known = null;
  try{ known = JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
  if(known){
    const fresh = nowList.filter(k=>!known.includes(k));
    if(fresh.length>0){
      const names = fresh.slice(0,3).map(k=>k.split('_')[0]).join('、');
      banner(`試合が更新されました。新しく ${names} が追加されています。`, 'ok');
    }
  }
  localStorage.setItem(key, JSON.stringify(nowList));
}

// 新しい版を初めて開いたときに、更新内容を一度だけ知らせる
function announceAppNews(){
  const key = 'cust_seen_version';
  const seen = localStorage.getItem(key);
  if(seen && seen !== APP_VERSION){
    banner('アプリが新しくなりました。' + APP_NEWS, 'ok');
  }
  localStorage.setItem(key, APP_VERSION);
}

// GitHub上のアプリが新しくなっていたら更新ボタンを出す
async function checkAppUpdate(){
  if(location.protocol === 'file:') return;  // 手元で開いたときは確認しない
  try{
    const url = location.href.split('?')[0].split('#')[0] + '?v=' + Date.now();
    const res = await fetch(url, { cache:'no-store' });
    const text = await res.text();
    const m = text.match(/APP_VERSION\s*=\s*'([^']+)'/);
    if(m && m[1] !== APP_VERSION){
      banner('アプリが新しくなっています。更新ボタンを押してください。', 'ok',
        '更新する', ()=>{ location.replace(location.pathname + '?v=' + Date.now()); });
    }
  }catch(e){}
}

/* ============================================================
   起動
============================================================ */
async function boot(){
  const body = document.getElementById('inBody');
  body.innerHTML = '<div class="loading">読み込んでいます…</div>';
  try{
    await loadInit();
  }catch(err){
    body.innerHTML = '<div class="errmsg">読み込めませんでした: '+esc(err.message)+
      '。通信の状態と、ファイル冒頭の GAS_URL を確認してください。</div>';
    return;
  }
  checkMeetNews();
  checkAppUpdate();
  announceAppNews();
  const my = myProfile();
  if(my && my.staff){
    showTab('view');   // 標準は記録を見るタブ
  } else if(my && my.name && INIT.roster.find(p=>p.name===my.name)){
    syncMyProfile(my);
    openMyPage(my.name);
  } else {
    showWelcome();
  }
}
boot();
</script>
