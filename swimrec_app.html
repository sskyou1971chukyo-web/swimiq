<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CUST 記録帳 | 中京大学水泳部</title>
<!-- ホーム画面に追加したとき、アプリのように全画面で開くための設定 -->
<meta name="theme-color" content="#1663C7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CUST記録帳">
<link rel="manifest" href="swimrec_manifest.webmanifest">
<link rel="apple-touch-icon" href="swimrec-icon-180.png">
<link rel="icon" type="image/png" href="swimrec-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=M+PLUS+1:wght@500;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ================= 基本デザイン =================
   赤・青・白 = プールのコースロープの配色
   フォント = BIZ UDゴシック (低視力の方向けのUDフォント)
=================================================== */
:root{
  --blue:      #1663C7;   /* プールブルー */
  --blue-deep: #0D2B52;   /* 電光掲示板の紺 */
  --blue-pale: #E6F0FB;   /* うすい水色 */
  --red:       #E5372E;   /* コースロープの赤 */
  --red-pale:  #FDEAE8;
  --white:     #FFFFFF;
  --bg:        #F3F8FE;
  --ink:       #14273F;   /* 本文の濃紺 */
  --gray:      #5E718A;
  --line:      #C9D8EA;
  --gold:      #F5B301;
  --silver:    #94A7BC;
  --bronze:    #C77B3F;
  --green:     #17934A;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:18px; }
body{
  font-family:"BIZ UDPGothic","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.num{ font-family:"M PLUS 1","BIZ UDPGothic",sans-serif; font-variant-numeric:tabular-nums; text-align:right; }

/* ---------- ヘッダーとコースロープ ---------- */
header{ background:var(--white); padding:18px 24px 14px; }
.brand{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.brand h1{ font-size:1.6rem; font-weight:700; letter-spacing:.02em; margin:0; line-height:0; }
.brand img.logo{ height:64px; width:auto; display:block; }
.brand .sub{ color:var(--gray); font-size:.95rem; }
/* コースロープ: 赤白青の帯。このアプリの目印です */
.rope{ height:12px; background:repeating-linear-gradient(90deg,
  var(--red) 0 34px, var(--white) 34px 46px, var(--blue) 46px 80px, var(--white) 80px 92px); }

/* ---------- 大タブ (入力 / 閲覧) ---------- */
.tabs{ display:flex; gap:14px; padding:16px 24px 0; max-width:1180px; margin:0 auto; }
.tab{
  flex:1; min-height:64px; font-size:1.25rem; font-weight:700;
  border:3px solid var(--blue); border-radius:14px 14px 0 0;
  background:var(--white); color:var(--blue); cursor:pointer;
}
.tab[aria-selected="true"]{ background:var(--blue); color:var(--white); }
.tab.red{ border-color:var(--red); color:var(--red); }
.tab.red[aria-selected="true"]{ background:var(--red); color:var(--white); }
.tab:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
/* タブの大きさの比率 入力:見る:設定 = 2:6:2 */
.tabs .tab:nth-child(1){ flex:2; }
.tabs .tab:nth-child(2){ flex:6; }
.tabs .tab:nth-child(3){ flex:2; }

main{ max-width:1180px; margin:0 auto; padding:20px 24px 80px; }

/* ---------- 閲覧のモード選択 ---------- */
.modes{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
.modehead{ font-weight:800; font-size:1.02rem; margin:0 0 6px; color:var(--navy); }
.mode{
  min-height:62px; font-size:1.08rem; font-weight:700;
  border:2.5px solid var(--line); border-radius:12px;
  background:var(--white); color:var(--ink); cursor:pointer;
}
.mode[aria-selected="true"]{ border-color:var(--red); background:var(--red); color:var(--white); }
.mode:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }

/* ---------- 共通部品 ---------- */
.card{ background:var(--white); border:1.5px solid var(--line); border-radius:16px; padding:22px; margin-bottom:20px; }
.card h2{ font-size:1.25rem; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.card h2::before{ content:""; width:10px; height:26px; border-radius:4px; background:var(--blue); }
.card.redline h2::before{ background:var(--red); }
.hint{ color:var(--gray); font-size:.95rem; margin-bottom:10px; }
.stack{ display:flex; flex-wrap:wrap; gap:10px; }

.btn{
  min-height:58px; padding:10px 22px; font-size:1.08rem; font-weight:700;
  border-radius:12px; border:2.5px solid var(--blue);
  background:var(--white); color:var(--blue); cursor:pointer;
  font-family:inherit;
}
.btn:hover{ background:var(--blue-pale); }
.btn.on{ background:var(--blue); color:var(--white); }
.btn.big{ min-height:72px; font-size:1.3rem; padding:12px 34px; }
.btn.red{ border-color:var(--red); color:var(--red); }
.btn.red.on, .btn.red.solid{ background:var(--red); color:var(--white); }
.btn.solid{ background:var(--blue); color:var(--white); }
.btn.ghost{ border-color:var(--line); color:var(--gray); }
.btn:disabled{ opacity:.4; cursor:not-allowed; }
.btn:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }

select,input[type="text"]{
  font-family:inherit; font-size:1.1rem; padding:12px 14px;
  border:2.5px solid var(--line); border-radius:12px; background:var(--white);
  min-height:58px; color:var(--ink);
}
select:focus,input:focus{ outline:4px solid var(--gold); outline-offset:1px; }
label.fld{ display:flex; flex-direction:column; gap:6px; font-weight:700; font-size:.95rem; }

/* ---------- 選手を探す部品 ---------- */
.finder .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.chip{
  min-height:52px; padding:6px 18px; font-size:1.02rem; font-weight:700;
  border:2.5px solid var(--line); border-radius:999px;
  background:var(--white); color:var(--ink); cursor:pointer; font-family:inherit;
}
.chip.on{ border-color:var(--blue); background:var(--blue); color:var(--white); }
.chip.on.redc{ border-color:var(--red); background:var(--red); }
.chip:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.athlist{ display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:10px; margin-top:12px; }
.ath{
  min-height:66px; border:2.5px solid var(--line); border-radius:12px;
  background:var(--white); cursor:pointer; text-align:left; padding:8px 14px; font-family:inherit;
}
.ath:hover{ border-color:var(--blue); background:var(--blue-pale); }
.ath .nm{ font-size:1.15rem; font-weight:700; display:block; }
.ath .kn{ color:var(--gray); font-size:.85rem; }
.ath:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.ath.sel{ border-color:var(--red); background:var(--red-pale); }
.ath.sel .nm::after{ content:" 選択中"; color:var(--red); font-size:.8rem; }
.selbar{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-top:10px;
  padding:10px 14px; background:var(--blue-pale); border-radius:12px; }
/* 一覧表のタイム入力欄 */
.rowtime{ font-family:"M PLUS 1",sans-serif; font-variant-numeric:tabular-nums;
  font-size:1.35rem; font-weight:800; min-height:56px; width:150px;
  border:2.5px solid var(--line); border-radius:10px; padding:6px 10px; text-align:right; }
.rowtime.ok{ border-color:var(--green); background:#F2FBF5; }
.rowtime.bad{ border-color:var(--red); background:var(--red-pale); }
.rowdone{ color:var(--green); font-weight:700; }

/* ---------- 入力の進みぐあい ---------- */
.steps{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.step{ padding:8px 16px; border-radius:999px; background:var(--white); border:2px solid var(--line);
  color:var(--gray); font-weight:700; font-size:.92rem; }
.step.now{ background:var(--red); border-color:var(--red); color:var(--white); }
.step.done{ background:var(--blue-pale); border-color:var(--blue); color:var(--blue); }

/* ---------- テンキー ---------- */
.timeview{
  font-size:4.2rem; text-align:center; letter-spacing:.03em; font-weight:800;
  background:var(--blue-pale); border:3px solid var(--blue); border-radius:16px;
  padding:14px 10px; margin-bottom:16px; min-height:110px;
}
.timeview .ph{ color:var(--gray); font-size:1.05rem; font-weight:400; font-family:"BIZ UDPGothic",sans-serif; }
.pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:520px; margin:0 auto; }
.key{
  min-height:88px; font-size:2rem; font-weight:800; border-radius:14px;
  border:2.5px solid var(--line); background:var(--white); cursor:pointer;
  font-family:"M PLUS 1",sans-serif;
}
.key:hover{ background:var(--blue-pale); }
.key.fn{ font-size:1.1rem; font-family:"BIZ UDPGothic",sans-serif; color:var(--gray); }
.key:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.padwrap .btn.big{ width:100%; max-width:520px; margin:18px auto 0; display:block; }

/* ---------- 電光掲示板 (確認画面) ---------- */
.board{
  background:var(--blue-deep); border-radius:20px; padding:34px 26px; text-align:center;
  color:var(--white); border:6px solid var(--blue);
}
.board .who{ font-size:1.5rem; font-weight:700; }
.board .what{ font-size:1.15rem; color:#9FC3F0; margin-top:4px; }
.board .time{ font-size:5.2rem; font-weight:800; color:var(--gold); letter-spacing:.04em; margin:10px 0 4px; }
.board .cmp{ font-size:1.1rem; margin-top:6px; }
.board .cmp .up{ color:#FF8A80; font-weight:800; }
.board .cmp .down{ color:#9FC3F0; }
.confirmbtns{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:22px; }

/* ---------- 表 ---------- */
table{ width:100%; border-collapse:collapse; background:var(--white); }
th{ background:var(--blue); color:var(--white); font-size:.95rem; padding:10px 12px; text-align:center; position:sticky; top:0; }
td{ padding:10px 12px; border-bottom:1.5px solid var(--line); font-size:1.02rem; }
tr.rank1 td{ background:#FFF6DA; font-weight:700; }
tr.rank2 td{ background:#EEF3F8; font-weight:700; }
tr.rank3 td{ background:#F9EDE2; font-weight:700; }
.medal{ display:inline-block; min-width:2.1em; text-align:center; border-radius:8px; padding:2px 6px;
  color:var(--white); font-weight:800; margin-right:6px; }
.medal.m1{ background:var(--gold); } .medal.m2{ background:var(--silver); } .medal.m3{ background:var(--bronze); }
.pbtag{ color:var(--white); background:var(--red); border-radius:8px; padding:2px 8px; font-size:.85rem; font-weight:700; white-space:nowrap; }
.nw{ white-space:nowrap; }
.pbicon{ display:inline-block; vertical-align:middle; margin-right:6px; line-height:0; }
.pick2{ display:grid; grid-template-columns:1fr 1fr; gap:10px 12px; align-items:end; }
.pick2 .fld{ min-width:0; }
.pick2 .wide{ grid-column:1/-1; }
.ktcell{ background:none; border:none; color:var(--blue); text-decoration:underline;
  font:inherit; font-weight:700; padding:8px 2px; min-height:44px; cursor:pointer; white-space:nowrap; }
.ktcell:focus-visible{ outline:4px solid var(--gold); outline-offset:2px; }
.ktdetail td{ background:#EEF4FF; font-size:.98rem; }
.tablewrap{ max-height:560px; overflow:auto; border:1.5px solid var(--line); border-radius:12px; }

/* ---------- グラフ ---------- */
#fsOverlay{ position:fixed; inset:0; background:#F4F8FF; z-index:9999; display:flex; flex-direction:column; }
#fsOverlay[hidden]{ display:none; }
.fshead{ display:flex; align-items:center; gap:10px; padding:12px 14px 4px; }
.fswrap{ flex:1; position:relative; margin:4px 10px 14px; background:var(--white);
  border:1.5px solid var(--line); border-radius:12px; padding:8px; min-height:0; }
.chartbox{ background:var(--white); border:1.5px solid var(--line); border-radius:16px; padding:18px; }
.legendline{ display:flex; gap:22px; flex-wrap:wrap; margin-top:10px; font-size:.95rem; font-weight:700; }
.legendline .sw{ display:inline-block; width:34px; height:0; border-top:4px dashed; vertical-align:middle; margin-right:6px; }

/* ---------- そのほか ---------- */
.okmsg{ background:#E8F6EE; border:2.5px solid var(--green); color:var(--green);
  border-radius:14px; padding:18px; font-size:1.2rem; font-weight:700; text-align:center; }
.errmsg{ background:var(--red-pale); border:2.5px solid var(--red); color:var(--red);
  border-radius:14px; padding:16px; font-weight:700; }
.loading{ text-align:center; color:var(--gray); padding:30px; font-size:1.05rem; }
.visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
/* ボタンを押したときの灰色のちらつきを消し、押しやすくする */
button{ -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
@media (max-width:640px){
  html{ font-size:16px; }
  header{ padding:12px 14px 10px; }
  .brand img.logo{ height:46px; }
  main{ padding:14px 12px 60px; }
  .tabs{ padding:12px 12px 0; gap:8px; }
  .tab{ font-size:.95rem; min-height:56px; padding:4px 2px; }
  .modes{ grid-template-columns:repeat(3,1fr); gap:8px; }
  .mode{ min-height:56px; font-size:.98rem; }
  .card{ padding:14px; border-radius:12px; }
  .stack{ gap:8px; }
  .btn{ min-height:54px; padding:8px 14px; font-size:1rem; }
  .btn.big{ min-height:62px; font-size:1.12rem; padding:10px 18px; }
  label.fld{ width:100%; }
  select,input[type="text"],input[type="date"],input[type="password"]{ width:100%; }
  .timeview{ font-size:3rem; min-height:88px; }
  .key{ min-height:72px; }
  .board{ padding:22px 12px; }
  .board .time{ font-size:3.2rem; }
  .athlist{ grid-template-columns:1fr 1fr; }
  th,td{ padding:8px 8px; font-size:.92rem; }
  .tablewrap{ max-height:70vh; }
}
/* iPadの縦向きなど中間サイズ */
@media (min-width:641px) and (max-width:1024px){
  .modes{ grid-template-columns:repeat(3,1fr); }
}
</style>
</head>

/* ============================================================
   タイムの読み書き (文字列 と 秒数 の変換)
============================================================ */
// "1:54.83" や "1.54.83" や "26.10" を秒数にする。読めなければ null
function toSec(str){
  if(!str) return null;
  const s = String(str).trim();
  let m = s.match(/^(\d+)[:.](\d{1,2})\.(\d{1,2})$/);   // 分:秒.コンマ
  if(m) return Number(m[1])*60 + Number(m[2]) + Number(('0.'+m[3]));
  m = s.match(/^(\d{1,2})\.(\d{1,2})$/);                 // 秒.コンマ
  if(m) return Number(m[1]) + Number('0.'+m[2]);
  return null;
}
// 記録の文字を、100分の1の位まで必ずある形に整える (46.4 → 46.40、26 → 26.00)
function fmtTime(t){
  if(t==null || t==='' ) return t;
  const s = String(t).trim();
  const sec = toSec(s);
  if(sec!=null) return toStr(sec);
  let m = s.match(/^(\d+):(\d{1,2})(?:\.(\d{1,2}))?$/);   // 2:01 や 2:01.4
  if(m) return m[1]+':'+m[2].padStart(2,'0')+'.'+(m[3]||'').padEnd(2,'0');
  m = s.match(/^(\d+)(?:\.(\d{1,2}))?$/);                  // 26 や 46.4
  if(m) return m[1]+'.'+(m[2]||'').padEnd(2,'0');
  return s;
}
// 秒数を "1:54.83" の形にもどす
function toStr(sec){
  if(sec == null) return '';
  const cs = Math.round(sec*100);
  const m = Math.floor(cs/6000);
  const s = Math.floor((cs%6000)/100);
  const c = cs%100;
  const pad = n => String(n).padStart(2,'0');
  return m>0 ? m+':'+pad(s)+'.'+pad(c) : s+'.'+pad(c);
}
// テンキーで押した数字の列 (例 "15483") を "1:54.83" にする
function digitsToTime(d){
  if(d.length===0) return '';
  const p = d.padStart(5,'0');
  const cs = p.slice(-2);
  const ss = p.slice(-4,-2);
  const mm = p.slice(0,-4).replace(/^0+/,'');
  return (mm? mm+':' : '') + ss + '.' + cs;
}
function digitsValid(d){
  if(d.length<3 || d.length>6) return false;
  const p = d.padStart(5,'0');
  return Number(p.slice(-4,-2)) < 60;   // 秒は59まで
}
const esc = t => String(t).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ============================================================
   サーバーとのやりとり
============================================================ */
async function apiGet(action){
  const res = await fetch(GAS_URL + '?action=' + action);
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}
async function apiSave(payload){
  // 保存でデータが変わるので、おぼえていた初期データは捨てて次回読み直す
  localStorage.removeItem('cust_init_cache');
  const res = await fetch(GAS_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },  // GASの決まりごと
    body: JSON.stringify(Object.assign({action:'save'}, payload))
  });
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}
/* ============================================================
   セイコーの結果ページの取り込み
   (GASの窓口 action=seiko と action=seikoPdf を使う)
============================================================ */
async function seikoFetch(url){
  const res = await fetch(GAS_URL + '?action=seiko&url=' + encodeURIComponent(url));
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json.text || '';
}
async function seikoPdfFetch(url, who){
  const res = await fetch(GAS_URL + '?action=seikoPdf&url=' + encodeURIComponent(url) +
    '&who=' + encodeURIComponent(who));
  return await res.json();
}
// 相対の住所を絶対にそろえ、../ をたたむ
function seikoResolve(u, baseUrl){
  if(/^https?:/i.test(u)){ /* そのまま */ }
  else if(u.startsWith('/')) u = 'https://swim.seiko.co.jp' + u;
  else u = baseUrl.replace(/[^\/]*$/, '') + u.replace(/^\.\//,'');
  // /a/b/../c を /a/c にたたむ
  const parts = [];
  u.replace('https://swim.seiko.co.jp','').split('/').forEach(p=>{
    if(p==='..') parts.pop();
    else if(p!=='' && p!=='.') parts.push(p);
  });
  return 'https://swim.seiko.co.jp/' + parts.join('/');
}
// ページの中のhtmリンクを拾う(入口と同じ大会のフォルダの中だけ)
function seikoLinks(htmlText, baseUrl, folder){
  const out = [];
  const re = /(?:href|src)\s*=\s*["']?([^"'>\s]+\.html?)/gi;
  let m;
  while((m = re.exec(htmlText))){
    const u = seikoResolve(m[1], baseUrl);
    if(u.startsWith(folder) && !out.includes(u)) out.push(u);
  }
  return out;
}
// 種目名の文字(例: 女子 100m バタフライ 決勝)から種目を読み取る予備の部品
function seikoEvent(text){
  const plain = String(text).replace(/<[^>]+>/g,' ');
  const m = plain.match(/(男子|女子)[^0-9]{0,20}(\d{2,4})\s*m?\s*(自由形|背泳ぎ|平泳ぎ|バタフライ|個人メドレー)/);
  if(!m) return null;
  const map = { '自由形':'Fr', '背泳ぎ':'Ba', '平泳ぎ':'Br', 'バタフライ':'Fly', '個人メドレー':'IM' };
  const round = (plain.match(/タイム決勝|B決勝|決勝|予選/)||[''])[0];
  return { sex:m[1], dist:Number(m[2]), stroke:map[m[3]], round };
}

// ページの中の、結果PDFへのリンクと、そのそばの種目名を拾う
function seikoPdfLinks(htmlText, baseUrl, folder){
  const out = [];
  const re = /<a[^>]+(?:href|HREF)\s*=\s*["']?([^"'>\s]+\.pdf)["']?[^>]*>([\s\S]*?)<\/a>/gi;
  let m;
  while((m = re.exec(htmlText))){
    const u = seikoResolve(m[1], baseUrl);
    if(!u.startsWith(folder)) continue;
    const label = m[2].replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    if(!out.some(x=>x.url===u)) out.push({ url:u, label: label || u.split('/').pop() });
  }
  return out;
}

async function loadInit(){
  if(INIT) return INIT;
  // 10分以内に開き直したときは、おぼえておいたデータで即はじめる
  try{
    const c = JSON.parse(localStorage.getItem('cust_init_cache')||'null');
    if(c && Date.now()-c.at < 10*60*1000){ INIT = c.data; }
  }catch(e){}
  if(!INIT){
    INIT = await apiGet('init');
    try{ localStorage.setItem('cust_init_cache', JSON.stringify({at:Date.now(), data:INIT})); }catch(e){}
  }
  // 設定画面で種目が登録されていれば、そちらを使う
  if(INIT.events && INIT.events.length) STROKES = INIT.events;
  return INIT;
}
async function loadRecords(force){
  if(DATA && !force) return DATA;
  // 一度読んだら10分間は覚えておく (localStorage)
  try{
    if(!force){
      const c = JSON.parse(localStorage.getItem('cust_rec_cache')||'null');
      if(c && Date.now()-c.at < 10*60*1000){ DATA = c.data; return DATA; }
    }
  }catch(e){}
  DATA = await apiGet('records');
  try{ localStorage.setItem('cust_rec_cache', JSON.stringify({at:Date.now(), data:DATA})); }catch(e){}
  return DATA;
}
// 記録の配列を、あつかいやすい形にひらく
function rec(r){
  const mt = DATA.meets[r[0]];
  return { meet:mt, name:r[1], sex:r[2], stroke:r[3], dist:r[4],
           time:r[5], best:r[6], pb:r[7]===1,
           sec:toSec(r[5]), stamp:mt.year*100+mt.month };

/* ============================================================
   選手を探す共通部品
   学年・男女・五十音・文字検索(音声入力もOK)で絞り込みます
============================================================ */
function makeFinder(container, onPick, multiDone, preselected, doneLabel){
  // 学年・男女は複数選べる(空っぽのときは絞り込みなし)
  const state = { grade:new Set(), sex:new Set(), text:'' };
  const grades = [...new Set(INIT.roster.map(r=>r.grade).filter(Boolean))];

  container.innerHTML = `
    <div class="finder">
      <div class="chips" data-k="grade" role="group" aria-label="学年で絞る"></div>
      <div class="chips" data-k="sex" role="group" aria-label="男女で絞る"></div>
      <label class="fld">名前で検索(音声入力もつかえます)
        <input type="text" data-k="text" placeholder="例: やまもと">
      </label>
      ${multiDone? `<div class="selbar">
        <span class="selcount" style="font-weight:700">選択中: 0人</span>
        <button type="button" class="btn red solid" data-k="done" disabled>${esc(doneLabel||'選んだ選手で一覧を作る')}</button>
      </div>`:''}
      <div class="athlist" role="list"></div>
    </div>`;
  const selected = new Map();
  (preselected||[]).forEach(p=>selected.set(p.name, p));
  function paintSel(){
    if(!multiDone) return;
    container.querySelector('.selcount').textContent = '選択中: '+selected.size+'人';
    container.querySelector('[data-k="done"]').disabled = selected.size===0;
  }
  if(multiDone){
    container.querySelector('[data-k="done"]').onclick = ()=>multiDone(Array.from(selected.values()));
  }

  function chips(k, items){
    const box = container.querySelector(`.chips[data-k="${k}"]`);
    box.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'chip on'; all.textContent = 'すべて'; all.type='button';
    all.onclick = ()=>{ state[k].clear(); render(); };
    box.appendChild(all);
    items.forEach(v=>{
      const b = document.createElement('button');
      b.className = 'chip'; b.type='button';
      b.textContent = v.label!==undefined? v.label : v;
      const val = v.value!==undefined? v.value : v;
      // 押すたびに追加と取り消しが切り替わる
      b.onclick = ()=>{
        if(state[k].has(val)) state[k].delete(val);
        else state[k].add(val);
        render();
      };
      b.dataset.v = val;
      box.appendChild(b);
    });
  }
  chips('grade', grades);
  chips('sex', ['男','女']);
  container.querySelector('input[data-k="text"]').addEventListener('input', e=>{
    state.text = e.target.value.trim(); render();
  });
  paintSel();

  function render(){
    // チップの見た目を今の状態にそろえる(すべて=なにも選んでいないとき)
    ['grade','sex'].forEach(k=>{
      container.querySelectorAll(`.chips[data-k="${k}"] .chip`).forEach((b,i)=>{
        const on = i===0 ? state[k].size===0 : state[k].has(b.dataset.v);
        b.classList.toggle('on', on);
      });
    });
    const list = container.querySelector('.athlist');
    let people = INIT.roster.slice();
    if(state.grade.size) people = people.filter(p=>state.grade.has(p.grade));
    if(state.sex.size)   people = people.filter(p=>Array.from(state.sex).some(v=>(p.sex||'').startsWith(v)));
    if(state.text)  people = people.filter(p=>p.name.includes(state.text)||p.kana.includes(state.text));
    people.sort((a,b)=>(a.kana||a.name).localeCompare(b.kana||b.name,'ja'));
    list.innerHTML = '';
    if(people.length===0){
      list.innerHTML = '<div class="hint">この条件の選手はいません。条件を緩めてください。</div>';
      return;
    }
    // 一人だけ選ぶ画面では、名前のボタンではなくプルダウンで選ぶ
    if(!multiDone){
      const lab = document.createElement('label');
      lab.className = 'fld';
      lab.style.cssText = 'max-width:460px; grid-column:1/-1;';
      lab.textContent = '選手を選ぶ';
      const sel = document.createElement('select');
      const head = document.createElement('option');
      head.value = '';
      head.textContent = `選手を選んでください (${people.length}人)`;
      sel.appendChild(head);
      people.forEach((p,i)=>{
        const o = document.createElement('option');
        o.value = i;
        const sub = [p.kana, [p.grade, p.sex].filter(Boolean).join('・')].filter(Boolean).join(' ');
        o.textContent = p.name + (sub? '　'+sub : '');
        sel.appendChild(o);
      });
      sel.onchange = ()=>{ if(sel.value!=='') onPick(people[Number(sel.value)]); };
      lab.appendChild(sel);
      list.appendChild(lab);
      return;
    }
    people.forEach(p=>{
      const b = document.createElement('button');
      b.className='ath'; b.type='button'; b.setAttribute('role','listitem');
      const sub = [p.kana, [p.grade, p.sex].filter(Boolean).join('・')].filter(Boolean).join('　');
      b.innerHTML = `<span class="nm">${esc(p.name)}</span><span class="kn">${esc(sub)}</span>`;
      if(multiDone){
        if(selected.has(p.name)) b.classList.add('sel');
        b.setAttribute('aria-pressed', selected.has(p.name));
        b.onclick = ()=>{
          if(selected.has(p.name)){ selected.delete(p.name); b.classList.remove('sel'); }
          else { selected.set(p.name, p); b.classList.add('sel'); }
          b.setAttribute('aria-pressed', selected.has(p.name));
          paintSel();
        };
      } else {
        b.onclick = ()=>onPick(p);
      }
      list.appendChild(b);
    });
  }
  render();
}

    const y = Number(ySel.value);
    const mo = Number(mSel.value);
    const hits = INIT.meets.filter(m=>m.year===y && (mo===0 || m.month===mo));
    nSel.innerHTML = '<option value="">試合を選んでください</option>';
    hits.forEach((m)=>{
      const o = document.createElement('option');
      o.value = INIT.meets.indexOf(m);
      o.textContent = `${m.month}月 ${m.meet} ${m.course||''}${m.ref?'(参考)':''}`;
      nSel.appendChild(o);
    });
    if(hits.length===0){
      nSel.innerHTML = '<option value="">この年月の試合はありません</option>';
    }
  }
  ySel.onchange = ()=>{ fillMonths(); fillNames(); };
  mSel.onchange = fillNames;
  nSel.onchange = ()=>{
    if(nSel.value==='') return;
    const m = INIT.meets[Number(nSel.value)];
    IN.meet = m.meet;
    IN.course = m.course || '長水路';
    stepEvent();
  };
  fillYears(); fillMonths(); fillNames();
}
function pickNewMeet(){
  const v = document.getElementById('newMeet').value.trim();
  if(!v){ alert('大会名を入れてください'); return; }
  IN.meet = v;
  IN.course = document.getElementById('newCourse').value;
  stepEvent();
}

  const body = document.getElementById('inBody');
  body.innerHTML = `
    <div class="card redline">
      <h2>種目を選ぶ　<span class="hint" style="font-weight:400">大会: ${esc(IN.meet)} ${esc(IN.course)}</span></h2>
      <div id="strokeBtns" class="stack" style="margin-bottom:14px"></div>
      <div id="distBtns" class="stack"></div>

    </div>`;

    const b = document.createElement('button');

function stepAthletes(){
  drawSteps(2);
  const body = document.getElementById('inBody');
  body.innerHTML = `
    <div class="card redline">
      <h2>この種目を泳いだ選手を選ぶ　<span class="hint" style="font-weight:400">${IN.dist}m${strokeJa(IN.stroke)}</span></h2>
      <p class="hint">何人でも選べます。押すたびに選択と取り消しが切り替わります。選び終わったら赤いボタンで一覧表を作ります。</p>
      <div id="finderBox"></div>
      <div style="margin-top:14px"><button class="btn ghost" onclick="stepEvent()">← 種目に戻る</button></div>
    </div>`;
  makeFinder(document.getElementById('finderBox'), null, list=>{
    IN.list = list;
    stepTable();
  }, IN.list);
}

// その選手・種目のいちばん速い記録を探す(ベスト比較用)
function findBest(name, stroke, dist, course){
  if(!DATA) return null;
  let best = null;
  DATA.records.map(rec).forEach(r=>{
    if(r.name!==name || r.stroke!==stroke || r.dist!==dist) return;
    if(course && r.meet.course && r.meet.course!==course) return;
    if(r.sec!=null && (best==null || r.sec<best)) best = r.sec;
  });
  return best;
}

function stepTable(){
  drawSteps(3);
  const body = document.getElementById('inBody');
  let rowsHtml = '';
  IN.list.forEach((p,i)=>{
    const best = findBest(p.name, IN.stroke, IN.dist, IN.course);
    const d = IN.times[p.name] || '';
    const isSaved = !!IN.saved[p.name];
    rowsHtml += `<tr data-i="${i}" data-name="${esc(p.name)}">
      <td style="font-weight:700; font-size:1.1rem">${esc(p.name)}</td>
      <td class="num">${best!=null? toStr(best) : '-'}</td>
      <td><input class="rowtime" inputmode="numeric" autocomplete="off"
        aria-label="${esc(p.name)}のタイム" placeholder="15483"
        value="${d? digitsToTime(d):''}" data-d="${d}" ${isSaved?'disabled':''}></td>
      <td class="stcell">${isSaved?'<span class="rowdone">保存済み</span>':''}</td>
      <td>${isSaved?'' : `<button type="button" class="btn ghost rowdel" style="min-height:44px" aria-label="${esc(p.name)}を一覧から外す">外す</button>`}</td></tr>`;
  });
  body.innerHTML = `
    <div class="card redline">
      <h2>${esc(IN.meet)}　${IN.dist}m${strokeJa(IN.stroke)}(${esc(IN.course)}) の記録を打ち込む</h2>
      <div class="stack" style="align-items:end; margin-bottom:10px">
        <label class="fld">この種目の実施日
          <input type="date" id="btDate" value="${IN.date || new Date().toISOString().slice(0,10)}">
        </label>
      </div>
      <p class="hint">数字だけを打ちます。例: 1分54秒83 は 15483。区切りは自動で入ります。日本語入力のままの全角数字でも大丈夫です。改行キーで次の選手に移ります。空欄の選手は保存されません。</p>
      <div class="tablewrap"><table id="batchTable">
        <tr><th>選手</th><th>これまでのベスト</th><th>今回の記録</th><th></th><th></th></tr>
        ${rowsHtml}
      </table></div>
      <div class="stack" style="margin-top:16px">
        <button class="btn big red solid" onclick="saveBatchGo()">まとめて保存する</button>
        <button class="btn" onclick="captureTable(); stepAthletes()">選手を追加・削除する</button>
        <button class="btn ghost" onclick="stepEvent()">種目に戻る</button>
      </div>
      <div id="btMsg" style="margin-top:12px"></div>
    </div>`;
  // タイム欄: 数字だけを受け付けて、打つそばから 1:54.83 の形に整える
  // 日本語入力がオンで全角の１５４８３になっても、自動で半角に直します
  function formatRow(inp){
    const half = inp.value.replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    const d = half.replace(/[^0-9]/g,'').replace(/^0+/,'').slice(0,6);
    inp.dataset.d = d;
    inp.value = d? digitsToTime(d) : '';
    inp.classList.remove('ok','bad');
    if(d) inp.classList.add(digitsValid(d)? 'ok' : 'bad');
  }
  document.querySelectorAll('#batchTable .rowtime').forEach(inp=>{
    if(inp.dataset.d) formatRow(inp);
    inp.addEventListener('input', e=>{ if(!e.isComposing) formatRow(inp); });
    inp.addEventListener('compositionend', ()=>formatRow(inp));
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter' && !e.isComposing){
        e.preventDefault();
        // その時点で入力できる欄の中から、次の欄へ移る
        const list = Array.from(document.querySelectorAll('#batchTable .rowtime:not(:disabled)'));
        const next = list[list.indexOf(inp)+1];
        if(next) next.focus();
      }
    });
  });
  // 外すボタン: タイムを保ったまま、その選手だけ一覧から外す
  document.querySelectorAll('#batchTable .rowdel').forEach(btn=>{
    btn.onclick = ()=>{
      const tr = btn.closest('tr');
      const name = tr.dataset.name;
      captureTable();
      IN.list = IN.list.filter(p=>p.name!==name);
      delete IN.times[name];
      stepTable();
    };
  });
  document.getElementById('btDate').onchange = e=>{ IN.date = e.target.value; };
  const first = document.querySelector('#batchTable .rowtime:not(:disabled)');
  if(first) first.focus();
}

// 表に打ち込んだタイムを覚えておく(選手の追加・削除で表を作り直すときに使う)
function captureTable(){
  document.querySelectorAll('#batchTable tr[data-name]').forEach(tr=>{
    const name = tr.dataset.name;
    const d = tr.querySelector('.rowtime').dataset.d || '';
    if(d) IN.times[name] = d; else delete IN.times[name];
  });
}

async function saveBatchGo(){
  const msg = document.getElementById('btMsg');
  const rows = Array.from(document.querySelectorAll('#batchTable tr[data-i]'));
  const entries = [];
  const badNames = [];
  rows.forEach(tr=>{
    const p = IN.list[Number(tr.dataset.i)];
    const inp = tr.querySelector('.rowtime');
    const d = inp.dataset.d || '';
    if(tr.querySelector('.stcell').textContent.indexOf('保存済み')>=0) return; // 二重保存を防ぐ
    if(!d) return;
    if(!digitsValid(d)){ badNames.push(p.name); return; }
    entries.push({ p, tr, time: digitsToTime(d) });
  });
  if(badNames.length>0){
    msg.innerHTML = `<div class="errmsg">タイムの形がおかしい選手がいます: ${esc(badNames.join('、'))}。秒は59までです。</div>`;
    return;
  }
  if(entries.length===0){
    msg.innerHTML = '<div class="errmsg">保存する記録がありません。タイムを入れてください。</div>';
    return;
  }
  if(!confirm(entries.length+'人の記録を '+IN.meet+' の '+IN.dist+'m'+strokeJa(IN.stroke)+' として保存します。よろしいですか。')) return;
  msg.innerHTML = '<div class="loading">'+entries.length+'件を保存しています…</div>';
  try{
    IN.date = document.getElementById('btDate').value;
    await apiSave({
      action:'saveBatch', meet: IN.meet, course: IN.course, date: IN.date,
      records: entries.map(e=>({ name:e.p.name, event: IN.dist+IN.stroke, time:e.time }))
    });
    localStorage.removeItem('cust_rec_cache');
    entries.forEach(e=>{
      const best = findBest(e.p.name, IN.stroke, IN.dist, IN.course);
      const sec = toSec(e.time);
      const pb = (best!=null && sec!=null && sec<best);
      IN.saved[e.p.name] = true;
      IN.times[e.p.name] = e.tr.querySelector('.rowtime').dataset.d || '';
      e.tr.querySelector('.stcell').innerHTML =
        '<span class="rowdone">保存済み</span>' + (pb? ' ' + BEST_MARK : '');
      e.tr.querySelector('.rowtime').disabled = true;
      const del = e.tr.querySelector('.rowdel');
      if(del) del.remove();
    });
    msg.innerHTML = `<div class="okmsg">${entries.length}件を保存しました。</div>
      <div class="stack" style="margin-top:12px; justify-content:center">
        <button class="btn big solid" onclick="IN.stroke=null; IN.dist=null; stepEvent()">同じ大会の別の種目へ</button>
        <button class="btn big" onclick="captureTable(); stepAthletes()">同じ種目で選手を追加</button>
        <button class="btn big ghost" onclick="stepMeet()">最初に戻る</button>
      </div>`;
  }catch(err){
    msg.innerHTML = '<div class="errmsg">保存できませんでした: '+esc(err.message)+'</div>';
  }
}

   閲覧 1: 試合で探す
============================================================ */
function viewMeet(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card">
      <h2>試合で探す</h2>
      <p class="hint">年と月を選ぶと、その年月の試合が試合名の欄に並びます。</p>
      <div class="pick2">
        <label class="fld">年<select id="vmYear"></select></label>
        <label class="fld">月<select id="vmMonth"></select></label>
        <label class="fld wide">試合名<select id="vmName"></select></label>
      </div>
      <div id="meetOut" style="margin-top:16px"></div>
    </div>`;

  const ySel = document.getElementById('vmYear');
  const mSel = document.getElementById('vmMonth');
  const nSel = document.getElementById('vmName');
  const years = [...new Set(DATA.meets.map(m=>m.year).filter(y=>y>0))].sort((a,b)=>b-a);

  function fillYears(){
    ySel.innerHTML = '';
    years.forEach(y=>{
      const o = document.createElement('option');
      o.value = y; o.textContent = y+'年';
      ySel.appendChild(o);
    });
  }
  function fillMonths(){
    const y = Number(ySel.value);
    const months = [...new Set(DATA.meets.filter(m=>m.year===y).map(m=>m.month).filter(m=>m>0))]
      .sort((a,b)=>b-a);
    mSel.innerHTML = '<option value="0">すべての月</option>';
    months.forEach(mo=>{
      const o = document.createElement('option');
      o.value = mo; o.textContent = mo+'月';
      mSel.appendChild(o);
    });
  }
  function fillNames(){
    const y = Number(ySel.value);
    const mo = Number(mSel.value);
    const hits = DATA.meets
      .map((m,i)=>({m,i}))
      .filter(x=>x.m.year===y && (mo===0 || x.m.month===mo))
      .sort((a,b)=>(b.m.year*100+b.m.month)-(a.m.year*100+a.m.month));
    nSel.innerHTML = '';
    hits.forEach(x=>{
      const o = document.createElement('option');
      o.value = x.i;
      o.textContent = `${x.m.month}月 ${x.m.meet} ${x.m.course||''}${x.m.ref?'(参考)':''}`;
      nSel.appendChild(o);
    });
    if(hits.length===0){
      nSel.innerHTML = '<option value="">この年月の試合はありません</option>';
      document.getElementById('meetOut').innerHTML = '';
      return;
    }
    draw();  // いちばん新しい試合を自動で表示する
  }
  function draw(){
    if(nSel.value==='') return;
    const idx = Number(nSel.value);
    const rows = DATA.records.map(rec).filter(r=>DATA.meets.indexOf(r.meet)===idx);
    const out = document.getElementById('meetOut');
    if(rows.length===0){ out.innerHTML = '<p class="hint">この大会の記録はありません。</p>'; return; }
    // 種目ごとにまとめる
    const groups = {};
    rows.forEach(r=>{
      const k = r.dist + 'm' + strokeJa(r.stroke) + '・' + r.sex;
      (groups[k] = groups[k]||[]).push(r);
    });
    let html = `<p class="hint">${rows.length}件の記録。ベスト更新は記録のうしろに赤い丸のベの印がつきます。各種目は5人まで表示、残りは表の中を下にすべらせて見られます。</p>`;
    Object.keys(groups).forEach(k=>{
      const g = groups[k].sort((a,b)=>(a.sec??9e9)-(b.sec??9e9));
      html += `<h3 style="margin:16px 0 6px; font-size:1.1rem; color:var(--blue); text-align:center">${esc(k)}</h3>
        <div class="tablewrap" style="max-height:300px"><table><tr><th>名前</th><th>記録</th><th>大会前ベスト</th></tr>`;
      g.forEach(r=>{
        html += `<tr><td class="nw" style="font-weight:700">${esc(r.name)}</td>
          <td class="num nw">${r.pb? BEST_MARK :''}${esc(fmtTime(r.time))}${recordBadges(r.sec, r.stroke, r.dist, r.sex, r.meet.course)}</td>
          <td class="num nw">${esc(fmtTime(r.best))}</td></tr>`;
      });
      html += '</table></div>';
    });
    out.innerHTML = html;
  }
  ySel.onchange = ()=>{ fillMonths(); fillNames(); };
  mSel.onchange = fillNames;
  nSel.onchange = draw;
  fillYears(); fillMonths(); fillNames();
}

/* ============================================================

function viewName(autoName){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card"><h2>名前で探す</h2><div id="nameFinder"></div></div>
    <div id="nameOut"></div>`;

  if(autoName){
    const p = INIT.roster.find(x=>x.name===autoName);
    if(p) showPerson(p, true);
  }

  function showPerson(p, isMine){
    const rows = DATA.records.map(rec).filter(r=>r.name===p.name)
      .sort((a,b)=>b.stamp-a.stamp);
    const out = document.getElementById('nameOut');
    // 生年月日を yyyy-mm-dd の形に直す(入力欄に入れるため)

    if(p.birth){
      const d = new Date(p.birth.replace(/\//g,'-'));
      if(!isNaN(d.getTime())){
        birthVal = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
    }
    const mineBar = isMine? `<div class="hint" style="margin-bottom:10px">この携帯は ${esc(p.name)} さんの携帯として登録されています。
      <button class="btn ghost" style="min-height:44px; margin-left:8px" onclick="unlinkDevice()">登録を変える</button></div>` : '';
    const profileCard = `
      ${mineBar}
      <div class="card"><h2>${esc(p.name)} さんの選手情報</h2>
        <p class="hint">生年月日を入れておくと、学年は毎年4月に自動で進級し、卒業すると自動で社会人(OB・OG)になります。今の学年: ${esc(p.grade||'未設定')}</p>
        <div class="stack" style="align-items:end">
          <label class="fld">男女
            <select id="pfSex">
              <option value="" ${!p.sex?'selected':''}>未設定</option>
              <option value="男" ${p.sex==='男'?'selected':''}>男</option>
              <option value="女" ${p.sex==='女'?'selected':''}>女</option>
            </select></label>
          <label class="fld">生年月日<input type="date" id="pfBirth" value="${birthVal}"></label>
          <button class="btn solid" onclick="saveProfile('${esc(p.name)}')">選手情報を保存する</button>
        </div>
        <div id="pfMsg" style="margin-top:10px"></div>
      </div>`;
    if(rows.length===0){
      out.innerHTML = profileCard + `<div class="card"><p class="hint">${esc(p.name)}さんの記録はまだありません。</p></div>`;
      out.scrollIntoView({behavior:'smooth'});
      return;
    }
    // 種目ごとにベストを出す
    const evs = {};
    rows.forEach(r=>{
      const k = r.stroke + '_' + r.dist + '_' + (r.meet.course||'');
      if(!evs[k] || (r.sec!=null && r.sec < evs[k].sec)) evs[k] = r;
    });
    let html = profileCard + `<div class="card"><h2>${esc(p.name)} さんの種目別ベスト</h2>
      <p class="hint">タイムを押すと出した大会が出ます。グラフのボタンを押すと、記録の推移が全画面で開きます。</p>
      <div class="tablewrap"><table><tr><th>種目</th><th>水路</th><th>ベスト</th><th></th></tr>`;
    Object.values(evs).sort((a,b)=>a.dist-b.dist).forEach((r,bi)=>{
      const cs = r.meet.course || '長水路';
      html += `<tr><td class="nw" style="font-weight:700">${evShort(r.dist, r.stroke)}</td>
        <td class="nw">${esc(courseShort(cs))}</td>
        <td class="num nw"><button type="button" class="ktcell nmtime" data-i="${bi}" aria-expanded="false"
          aria-label="${esc(toStr(r.sec)||fmtTime(r.time))}。押すと出した大会が出ます">${esc(toStr(r.sec)||fmtTime(r.time))}</button>${recordBadges(r.sec, r.stroke, r.dist, r.sex, cs)}</td>
        <td><button class="btn" style="min-height:46px"
          onclick="nameGraph('${r.stroke}',${r.dist},'${esc(cs)}')">グラフ</button></td></tr>
      <tr class="ktdetail nmdetail" data-i="${bi}" hidden><td colspan="4">大会: ${esc(r.meet.meet)} (${r.meet.year}年${r.meet.month}月)</td></tr>`;
    });
    html += `</table></div></div>
      <div class="card"><h2>すべての出場記録 (新しい順)</h2>
      <div class="tablewrap"><table><tr><th>大会</th><th>種目</th><th>記録</th></tr>`;
    rows.forEach(r=>{
      html += `<tr><td>${r.meet.year}年${r.meet.month}月 ${esc(r.meet.meet)} ${esc(courseShort(r.meet.course))}</td>
        <td class="nw">${evShort(r.dist, r.stroke)}</td>

    window.nameGraph = function(stroke, dist, course){
      renderProgress('nmChart', 'nmTitle', 'nmChartBox', p, stroke, dist, course);
    };
  }
}

/* ============================================================
   種目選びの共通部品 (種目・性別・水路)
============================================================ */
function eventPicker(box, onChange, withCourse){
  box.innerHTML = `
    <div class="pick2">
      <label class="fld">泳法<select data-k="st"></select></label>
      <label class="fld">距離<select data-k="ds"></select></label>
      <label class="fld">男女<select data-k="sx"><option>男子</option><option>女子</option></select></label>

    </div>`;
  const st = box.querySelector('[data-k="st"]');
  const ds = box.querySelector('[data-k="ds"]');
  STROKES.forEach(s=>{ const o=document.createElement('option'); o.value=s.code; o.textContent=s.ja; st.appendChild(o); });
  function fillDist(){
    ds.innerHTML='';
    STROKES.find(s=>s.code===st.value).dists.forEach(d=>{
      const o=document.createElement('option'); o.value=d; o.textContent=d+'m'; ds.appendChild(o);
    });
  }
  fillDist();
  function state(){
    return { stroke:st.value, dist:Number(ds.value),
      sex:box.querySelector('[data-k="sx"]').value,
      course: withCourse? box.querySelector('[data-k="cs"]').value : '' };
  }
  box.querySelectorAll('select').forEach(s=>s.onchange=()=>{ if(s===st) fillDist(); onChange(state()); });
  onChange(state());
}

/* ============================================================
   標準記録のライン (赤=日本選手権 / 緑=インカレ)
   をグラフに描きこむ道具
============================================================ */
const stdLinePlugin = {
  id: 'stdLines',
  afterDatasetsDraw(chart){
    const lines = chart.options.stdLines || [];
    const {ctx, chartArea, scales} = chart;
    lines.forEach((L, i)=>{
      const scale = L.axis==='x' ? scales.x : scales.y;
      if(!scale) return;
      const px = scale.getPixelForValue(L.value);
      ctx.save();
      ctx.strokeStyle = L.color; ctx.lineWidth = 3; ctx.setLineDash([10,7]);
      ctx.beginPath();
      if(L.axis==='x'){
        if(px<chartArea.left||px>chartArea.right){ ctx.restore(); return; }
        ctx.moveTo(px, chartArea.top); ctx.lineTo(px, chartArea.bottom);
      } else {
        if(px<chartArea.top||px>chartArea.bottom){ ctx.restore(); return; }
        ctx.moveTo(chartArea.left, px); ctx.lineTo(chartArea.right, px);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      // 全画面表示では線の文字は描かない(重なり防止。値は上の説明行に出す)
      if(chart.options.stdLineLabels===false){ ctx.restore(); return; }
      ctx.fillStyle = L.color;
      ctx.font = "700 15px 'BIZ UDPGothic', sans-serif";
      if(L.axis==='x'){
        // ラベルは棒と重ならないよう、グラフの上の余白に出す
        const y = chartArea.top - 10 - (lines.length - 1 - i) * 22;
        const rightSide = px > (chartArea.left + chartArea.right) / 2;
        ctx.textAlign = rightSide ? 'right' : 'left';
        ctx.fillText(L.label, rightSide ? px - 8 : px + 8, Math.max(y, 14));
      } else {
        const y2 = px - 8 - i*20;   // 縦グラフ用も同じくずらす
        ctx.textAlign = 'left';
        ctx.fillText(L.label, chartArea.left + 8, y2);
      }
      ctx.restore();
    });
  }
};
Chart.register(stdLinePlugin);

// 棒グラフのそれぞれの棒に、記録のタイムを書きこむ道具
const barValuePlugin = {
  id: 'barValues',
  afterDatasetsDraw(chart){
    if(!chart.options.barValues) return;
    const {ctx, chartArea} = chart;
    const meta = chart.getDatasetMeta(0);
    ctx.save();
    ctx.font = "800 16px 'M PLUS 1', sans-serif";
    meta.data.forEach((bar, i)=>{
      const v = chart.data.datasets[0].data[i];
      const label = toStr(v);
      const barWidth = bar.x - chartArea.left;
      if(barWidth > 95){
        // 棒が長ければ、棒の中の右はしに白い文字で
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'right';
        ctx.fillText(label, bar.x - 10, bar.y + 6);
      } else {
        // 棒が短ければ、棒の外がわの右に濃い文字で
        ctx.fillStyle = '#14273F';
        ctx.textAlign = 'left';
        ctx.fillText(label, bar.x + 8, bar.y + 6);
      }
    });
    ctx.restore();
  }
};
Chart.register(barValuePlugin);

// 折れ線グラフのそれぞれの点に、記録のタイムを書きこむ道具
const pointValuePlugin = {
  id: 'pointValues',
  afterDatasetsDraw(chart){
    if(!chart.options.pointValues) return;
    const {ctx, chartArea} = chart;
    const meta = chart.getDatasetMeta(0);
    const data = chart.data.datasets[0].data;
    const bestSec = Math.min.apply(null, data);
    ctx.save();
    meta.data.forEach((pt, i)=>{
      const v = data[i];
      const isBest = v === bestSec;
      ctx.font = (isBest? "800 17px" : "700 15px") + " 'M PLUS 1', sans-serif";
      ctx.fillStyle = isBest ? '#E5372E' : '#14273F';
      ctx.textAlign = 'center';
      // ふだんは点の上に。上端に近いときは点の下に出す
      let y = pt.y - 14;
      if(y < chartArea.top + 18) y = pt.y + 28;
      // 左右の点は、グラフの外にはみ出さないように内側へよせる
      let x = pt.x;
      if(x < chartArea.left + 40){ ctx.textAlign = 'left'; x = pt.x + 6; }
      if(x > chartArea.right - 40){ ctx.textAlign = 'right'; x = pt.x - 6; }
      const label = toStr(v) + (isBest ? ' ベスト' : '');
      ctx.fillText(label, x, y);
    });
    ctx.restore();
  }
};
Chart.register(pointValuePlugin);
let activeChart = null;
function newChart(canvas, config){
  if(activeChart){ activeChart.destroy(); }
  activeChart = new Chart(canvas, config);
  return activeChart;
}

let fsChart = null;
function ensureFsOverlay(){
  let ov = document.getElementById('fsOverlay');
  if(ov) return ov;
  ov = document.createElement('div');
  ov.id = 'fsOverlay';
  ov.hidden = true;
  ov.setAttribute('role','dialog');
  ov.setAttribute('aria-modal','true');
  ov.setAttribute('aria-label','グラフの全画面表示');
  ov.innerHTML = `
    <div class="fshead">
      <h2 id="fsTitle" style="font-size:1.05rem; flex:1; margin:0"></h2>
      <button type="button" class="btn red solid" id="fsClose"
        style="min-height:52px; min-width:110px" onclick="closeFullGraph()">とじる</button>
    </div>
    <p id="fsLegend" class="hint" style="margin:0 14px 6px"></p>
    <div class="fswrap"><canvas id="fsCanvas"></canvas></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('keydown', e=>{ if(e.key==='Escape') closeFullGraph(); });
  return ov;
}
function openFullGraph(title, legendHtml, config){
  const ov = ensureFsOverlay();
  document.getElementById('fsTitle').textContent = title;
  document.getElementById('fsLegend').innerHTML = legendHtml || '';
  ov.hidden = false;
  document.body.style.overflow = 'hidden';
  if(fsChart){ fsChart.destroy(); fsChart = null; }
  fsChart = new Chart(document.getElementById('fsCanvas'), config);
  document.getElementById('fsClose').focus();
}
function closeFullGraph(){
  const ov = document.getElementById('fsOverlay');
  if(!ov) return;
  if(fsChart){ fsChart.destroy(); fsChart = null; }
  ov.hidden = true;
  document.body.style.overflow = '';
}
// 標準記録の値を、全画面の説明行に色つきで出す
function stdLegendHtml(lines, tailText){
  const parts = lines.map(L=>`<span style="color:${L.color}; font-weight:800; white-space:nowrap">${esc(L.label)}</span>`);
  if(tailText) parts.push(`<span style="color:var(--gray)">${esc(tailText)}</span>`);
  return parts.join('　');
}
// 記録の推移グラフを全画面で描く共通の部品 (名前で探すとグラフの両方から使う)
function renderProgress(canvasId, titleId, boxId, p, stroke, dist, course){
  const rows = DATA.records.map(rec).filter(r=>
    r.name===p.name && r.stroke===stroke && r.dist===dist &&
    (r.meet.course||'長水路')===course && r.sec!=null
  ).sort((a,b)=>a.stamp-b.stamp);
  if(rows.length===0) return;
  const sex = (INIT.roster.find(x=>x.name===p.name)||{}).sex==='女'?'女子':'男子';
  const std = stdFor(stroke, dist, sex, course);
  const lines = stdLineList(std, 'y');
  const bestSec = Math.min(...rows.map(r=>r.sec));
  const secs = rows.map(r=>r.sec).concat(lines.map(L=>L.value));
  const min = Math.min(...secs), max = Math.max(...secs), padPx=(max-min)*0.12||1;
  openFullGraph(
    `${p.name} さんの ${dist}m${strokeJa(stroke)} (${course}) の推移`,
    stdLegendHtml(lines, '点を押すと大会名とタイムが出ます。上に行くほど速いタイムです。'),
    {
      type:'line',
      data:{
        labels: rows.map(r=>`${r.meet.year}年${r.meet.month}月 ${r.meet.meet}${r.meet.ref?'(参考)':''}`),
        datasets:[{
          data: rows.map(r=>r.sec),
          borderColor:'#1663C7', borderWidth:4, tension:.25,
          pointRadius: rows.map(r=>r.sec===bestSec?11:8),
          pointHitRadius: 26,
          pointBackgroundColor: rows.map(r=>r.sec===bestSec?'#E5372E':'#1663C7'),
          pointBorderColor:'#fff', pointBorderWidth:2
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        stdLines:lines, stdLineLabels:false, pointValues:false,
        plugins:{ legend:{display:false},
          tooltip:{ displayColors:false, padding:14,
            titleFont:{family:'BIZ UDPGothic', size:15, weight:'700'},
            bodyFont:{family:'M PLUS 1', size:19, weight:'800'},
            callbacks:{ label:c=>' '+toStr(c.parsed.y)+(rows[c.dataIndex].sec===bestSec?' (ベスト)':'') } } },
        scales:{
          y:{ reverse:true, min:min-padPx, max:max+padPx,
            title:{display:true, text:'タイム(上が速い)', font:{family:'BIZ UDPGothic', weight:'700'}},
            ticks:{ callback:v=>toStr(v), font:{family:'M PLUS 1', size:14} } },
          x:{ ticks:{ display:false }, grid:{ display:true } }
        }
      }
    });
}

// 複数の選手の推移をひとつのグラフにくらべて描く (グラフ画面から使う)
function renderProgressMulti(people, stroke, dist, course){
  const perRows = people.map(p=> DATA.records.map(rec).filter(r=>
    r.name===p.name && r.stroke===stroke && r.dist===dist &&
    (r.meet.course||'長水路')===course && r.sec!=null));
  const meetIdx = [...new Set([].concat(...perRows).map(r=>DATA.meets.indexOf(r.meet)))]
    .sort((a,b)=>(DATA.meets[a].year*100+DATA.meets[a].month)-(DATA.meets[b].year*100+DATA.meets[b].month));
  if(meetIdx.length===0) return;
  const labels = meetIdx.map(i=>{ const m = DATA.meets[i];
    return `${m.year}年${m.month}月 ${m.meet}${m.ref?'(参考)':''}`; });
  // 高コントラストの色を順番に使う
  const palette = ['#1663C7','#E5372E','#17934A','#7B2D8B','#E58E00','#0D2B52','#C77B3F','#008B9E'];
  const datasets = people.map((p,pi)=>{
    const rowsP = perRows[pi];
    const data = meetIdx.map(mi=>{
      const hits = rowsP.filter(r=>DATA.meets.indexOf(r.meet)===mi).map(r=>r.sec);
      return hits.length ? Math.min(...hits) : null;
    });
    const col = palette[pi % palette.length];
    return { label:p.name, data, borderColor:col, backgroundColor:col,
      borderWidth:4, tension:.25, spanGaps:true,
      pointRadius:8, pointHitRadius:24,
      pointBackgroundColor:col, pointBorderColor:'#fff', pointBorderWidth:2 };
  });
  // 男女がまざっているときは、標準記録の線は引かない
  const sexes = [...new Set(people.map(p=>(INIT.roster.find(x=>x.name===p.name)||{}).sex==='女'?'女子':'男子'))];
  const std = sexes.length===1 ? stdFor(stroke, dist, sexes[0], course) : null;
  const lines = std ? stdLineList(std, 'y') : [];
  const allSecs = [].concat(...datasets.map(d=>d.data.filter(v=>v!=null))).concat(lines.map(L=>L.value));
  const min = Math.min(...allSecs), max = Math.max(...allSecs), padPx=(max-min)*0.12||1;
  const title = (people.length===1
    ? people[0].name + ' さんの '
    : people.map(p=>p.name).join('・') + ' の ')
    + evShort(dist, stroke) + ' (' + courseShort(course) + ') の推移';
  openFullGraph(
    title,
    stdLegendHtml(lines, '点を押すと大会名とタイムが出ます。上に行くほど速いタイムです。'),
    {
      type:'line',
      data:{ labels, datasets },
      options:{
        responsive:true, maintainAspectRatio:false,
        stdLines:lines, stdLineLabels:false, pointValues:false,
        plugins:{
          legend:{ display: people.length>1,
            labels:{ font:{family:'BIZ UDPGothic', size:15, weight:'700'} } },
          tooltip:{ displayColors:false, padding:14,
            titleFont:{family:'BIZ UDPGothic', size:15, weight:'700'},
            bodyFont:{family:'M PLUS 1', size:19, weight:'800'},
            callbacks:{ label:c=>' '+c.dataset.label+' '+toStr(c.parsed.y) } } },
        scales:{
          y:{ reverse:true, min:min-padPx, max:max+padPx,
            title:{display:true, text:'タイム(上が速い)', font:{family:'BIZ UDPGothic', weight:'700'}},
            ticks:{ callback:v=>toStr(v), font:{family:'M PLUS 1', size:14} } },
          x:{ ticks:{ display:false }, grid:{ display:true } }
        }
      }
    });
}

// 標準記録をさがす。標準記録シートを最優先にして、
// なければ大会シート由来の値(長水路のみ)で補う
function stdFor(stroke, dist, sex, course){
  course = course || '長水路';
  const ev = dist + stroke;
  const all = INIT.standardsAll || {};
  let japanStr = all['日本選手権_'+course+'_'+sex+'_'+ev] || null;
  // ジャパンオープンは標準記録シートに登録された年だけ表示される
  const openStr = all['ジャパンオープン_'+course+'_'+sex+'_'+ev] || null;
  const incStr = all['インカレ_'+course+'_'+sex+'_'+ev] || null;
  if(course === '長水路' && !japanStr){
    const s = (INIT.standards||{})[ev+'_'+sex];
    if(s) japanStr = s.japan || null;
  }
  return { japan:toSec(japanStr), japanStr,
           open:toSec(openStr),  openStr,
           inc:toSec(incStr),    incStr };
}
// グラフに引く標準記録のライン一式を作る (赤=日本選手権 緑=インカレ)
function stdLineList(std, axis){
  const L = [];
  if(std.japan) L.push({axis, value:std.japan, color:'#E5372E', label:'JPN '+fmtTime(std.japanStr)});
  if(std.open)  L.push({axis, value:std.open,  color:'#1663C7', label:'JPOPN '+fmtTime(std.openStr)});
  if(std.inc)   L.push({axis, value:std.inc,   color:'#17934A', label:'Incolle '+fmtTime(std.incStr)});
  return L;
}

/* ============================================================
   閲覧 4: ランキング
   1位=金 2位=銀 3位=銅。標準記録のラインも重ねます
============================================================ */
function viewRank(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card redline"><h2>ランキング</h2>
      <div id="rkPick"></div>
      <p class="hint" style="margin-top:10px">今の部員(現役の学生)だけのランキングです。県大会の記録も含まれます。卒業・引退した選手の記録は、歴代記録の画面で見られます。</p>
      <div class="stack" style="margin-top:14px">
        <button type="button" class="btn red solid big" id="rkShow" disabled>グラフを全画面で見る</button>
      </div>
      <div id="rkOut" style="margin-top:16px"></div>
    </div>`;
  let cur = null;
  // ランキングは現役の学生だけ。名簿で学年が入っていて、OB・OGでない人が対象
  const activeNames = new Set(INIT.roster.filter(p=>p.grade && p.grade!=='OB' && p.grade!=='OG').map(p=>p.name));
  function draw(st){
    cur = st || cur; if(!cur) return;
    // 選手ごとのベストを出す (名前・秒数・出した大会の文字、の形にそろえる)
    const bestMap = {};
    DATA.records.map(rec).forEach(r=>{
      if(r.stroke!==cur.stroke || r.dist!==cur.dist || r.sex!==cur.sex) return;
      if(cur.course && (r.meet.course||'')!==cur.course) return;
      if(r.sec==null) return;
      if(!activeNames.has(r.name)) return;
      if(!bestMap[r.name] || r.sec < bestMap[r.name].sec){
        bestMap[r.name] = { name:r.name, sec:r.sec,
          meetText:`${r.meet.year}年${r.meet.month}月 ${r.meet.meet}` };
      }
    });
    // 県大会の記録も合流させる(現役の学生のみ)。
    // 男女は名簿から名前で引き当てる。水路は大会名に25mとあるものだけ短水路、それ以外は長水路とみなす
    const sexMap = {};
    INIT.roster.forEach(p=>{ if(p.sex) sexMap[p.name] = p.sex==='女' ? '女子' : '男子'; });
    KENTAI.forEach(k=>{
      const name = k[2];
      if(!activeNames.has(name)) return;
      if(sexMap[name] !== cur.sex) return;
      const m = String(k[4]).match(/^(\d+)([A-Za-z]+)$/);
      if(!m || Number(m[1])!==cur.dist || m[2]!==cur.stroke) return;
      const course = String(k[1]).includes('25m') ? '短水路' : '長水路';
      if(cur.course && course!==cur.course) return;
      const sec = toSec(k[6]);
      if(sec==null) return;
      const dm = String(k[0]).match(/^(\d{4})\/(\d{1,2})/);
      const meetText = (dm ? Number(dm[1])+'年'+Number(dm[2])+'月 ' : '') + kentaiMeetLabel(k[1]) + ' (県大会)';
      if(!bestMap[name] || sec < bestMap[name].sec){
        bestMap[name] = { name:name, sec:sec, meetText:meetText };
      }
    });
    const ranked = Object.values(bestMap).sort((a,b)=>a.sec-b.sec).slice(0,15);
    const out = document.getElementById('rkOut');
    if(ranked.length===0){
      out.innerHTML='<p class="hint">この条件の記録はありません。</p>';
      document.getElementById('rkShow').disabled = true;
      return;
    }
    // 表
    let html = `<p class="hint">タイムを押すと出した大会が出ます。</p>
      <div class="tablewrap"><table><tr><th>順位</th><th>名前</th><th>ベスト</th></tr>`;
    ranked.forEach((r,i)=>{
      const cls = i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
      const medal = i<3? `<span class="medal m${i+1}">${i+1}位</span>` : `${i+1}位`;
      html += `<tr class="${cls}"><td class="nw">${medal}</td><td class="nw">${esc(r.name)}</td>
        <td class="num nw"><button type="button" class="ktcell rktime" data-i="${i}" aria-expanded="false"
          aria-label="${toStr(r.sec)}。押すと出した大会が出ます">${toStr(r.sec)}</button>${recordBadges(r.sec, cur.stroke, cur.dist, cur.sex, cur.course)}</td></tr>
      <tr class="ktdetail rkdetail" data-i="${i}" hidden><td colspan="3">大会: ${esc(r.meetText)}</td></tr>`;
    });
    out.innerHTML = html + '</table></div>';
    out.querySelectorAll('button.rktime').forEach(b=>{
      b.onclick = ()=>{
        const det = out.querySelector(`tr.rkdetail[data-i="${b.dataset.i}"]`);
        det.hidden = !det.hidden;
        b.setAttribute('aria-expanded', String(!det.hidden));
      };
    });
    // グラフは全画面表示ボタンから開く(小さな画面での重なりをなくすため)
    const std = stdFor(cur.stroke, cur.dist, cur.sex, cur.course);
    const lines = stdLineList(std, 'x');
    const btn = document.getElementById('rkShow');
    btn.disabled = false;
    btn.onclick = ()=>{
      const colors = ranked.map((_,i)=>
        i===0?'#F5B301': i===1?'#94A7BC': i===2?'#C77B3F':'#1663C7');
      const secs = ranked.map(r=>r.sec).concat(lines.map(L=>L.value));
      const min = Math.min(...secs), max = Math.max(...secs), padPx=(max-min)*0.08||1;
      openFullGraph(
        `${cur.dist}m${strokeJa(cur.stroke)} ${cur.sex} (${cur.course}) ランキング`,
        stdLegendHtml(lines, '棒を押すとタイムが出ます。左に長いほど速いタイムです。'),
        {
          type:'bar',

/* ============================================================
   閲覧: 中京歴代ランキング
   昔の記録を手で打ち込め、現役が上回ると自動で順位が入れ替わります
============================================================ */
function viewLegend(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card redline"><h2>中京歴代記録</h2>
      <div id="lgPick"></div>
      <p class="hint" style="margin-top:10px">1957年からの歴代記録の歴代トップ10です。現役の部員が上回ったときだけ、自動で順位が入れ替わります。OB・OGの今の記録では書き換わりません。</p>
      <div id="lgOut" style="margin-top:12px"></div>
    </div>`;
  let cur = null;
  // 自動の入れ替えは現役の部員だけ。OB・OGや名簿にいない人の
  // 今の大会記録では、歴代記録は書き換わらない
  const obNames = new Set(INIT.roster.filter(p=>p.grade==='OB'||p.grade==='OG').map(p=>p.name));
  const activeNames = new Set(INIT.roster.filter(p=>p.grade && p.grade!=='OB' && p.grade!=='OG').map(p=>p.name));
  eventPicker(document.getElementById('lgPick'), st=>{ cur = st; drawLegend(cur); }, true);

  function drawLegend(st){
    cur = st || cur; if(!cur) return;
    // 現役部員の大会記録: 選手ごとにいちばん速いもの
    const bestMap = {};
    DATA.records.map(rec).forEach(r=>{
      if(r.stroke!==cur.stroke || r.dist!==cur.dist || r.sex!==cur.sex) return;
      if((r.meet.course||'')!==cur.course) return;
      if(r.sec==null) return;
      if(obNames.has(r.name) || !activeNames.has(r.name)) return;
      if(!bestMap[r.name] || r.sec < bestMap[r.name].sec){
        bestMap[r.name] = { name:r.name, sec:r.sec, note:`${r.meet.year}年` };
      }
    });
    // 手で打ち込んだ歴代記録も合わせる(同じ人は速いほうを残す)
    (DATA.legacy||[]).forEach(L=>{
      const m = String(L.event).match(/^(\d+)\s*(Fr|Ba|Br|Fly|IM)/);
      if(!m) return;
      if(Number(m[1])!==cur.dist || m[2]!==cur.stroke) return;
      if(L.sex!==cur.sex || L.course!==cur.course) return;
      const sec = toSec(L.time);
      if(sec==null) return;
      if(!bestMap[L.name] || sec < bestMap[L.name].sec){
        bestMap[L.name] = { name:L.name, sec:sec, note: L.year? L.year+'年' : '' };
      }
    });
    const ranked = Object.values(bestMap).sort((a,b)=>a.sec-b.sec).slice(0,10);
    const out = document.getElementById('lgOut');
    if(ranked.length===0){ out.innerHTML='<p class="hint">この条件の記録はまだありません。</p>'; return; }
    let html = `<div class="tablewrap"><table><tr><th>順位</th><th>名前</th><th>記録</th><th>備考</th></tr>`;
    ranked.forEach((r,i)=>{
      const cls = i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
      const medal = i<3? `<span class="medal m${i+1}">${i+1}位</span>` : `${i+1}位`;
      // 歴代記録には、世界記録・アジア記録・日本記録・学生記録の札だけを付ける
      // (日本選手権突破などの現役向けの札は、昔の記録には出さない)
      const badge = recordBadges(r.sec, cur.stroke, cur.dist, cur.sex, cur.course);
      html += `<tr class="${cls}"><td class="nw">${medal}</td><td class="nw">${esc(r.name)}</td>
        <td class="num nw" style="font-weight:800">${toStr(r.sec)}${badge}</td>
        <td class="nw" style="color:var(--gray); font-size:.92rem">${esc(r.note)}</td></tr>`;
    });
    out.innerHTML = html + '</table></div>';
  }

}

/* ============================================================
   記録のふだ (WR=世界記録 AS=アジア記録 NR=日本記録 UR=学生記録)
   タイムが記録に届いていたら、しるしを返します
============================================================ */
const RECORD_KINDS = [
  ['世界記録','WR','#0D2B52'],
  ['アジア記録','AS','#7B2D8B'],
  ['日本記録','NR','#E5372E'],
  ['学生記録','UR','#17934A']
];
function recordBadges(sec, stroke, dist, sex, course){
  if(sec==null) return '';
  const all = INIT.standardsAll || {};
  const ev = dist + stroke;
  let out = '';
  RECORD_KINDS.forEach(k=>{
    const t = toSec(all[k[0]+'_'+(course||'長水路')+'_'+sex+'_'+ev]);
    if(t!=null && sec<=t){
      out += ` <span class="pbtag" style="background:${k[2]}">${k[1]}</span>`;
    }
  });
  return out;
}

    const kind = document.getElementById('rcKind').value;

    const course = document.getElementById('rcCourse').value;
    const all = INIT.standardsAll || {};
    const info = INIT.standardsInfo || {};

      <div class="tablewrap"><table>
      <tr><th>種目</th><th>記録</th><th>選手</th></tr>`;
    let any = false;
    STROKES.forEach(s=>{
      s.dists.forEach(d=>{
        const key = kind+'_'+course+'_'+sex+'_'+d+s.code;
        const t = all[key];
        if(!t) return;
        any = true;
        const f = info[key] || {};
        const detail = f.holder
          ? `所属: ${esc(f.team||'-')}　樹立日: ${esc(f.date||'-')}　大会: ${esc(f.meet||'-')}　場所: ${esc(f.place||'-')}`
          : '詳しい情報は登録されていません。';
        html += `<tr class="rcrow">
          <td class="nw" style="font-weight:700">${evShort(d, s.code)}</td>
          <td class="num nw" style="font-weight:800; font-size:1.1rem">${esc(fmtTime(t))}</td>
          <td><button type="button" class="btn ghost rcname" aria-expanded="false"
            style="min-height:48px; text-align:left; white-space:nowrap">${esc(f.holder||'-')}</button></td></tr>
          <tr class="rcdetail" hidden><td colspan="3"
            style="background:var(--blue-pale); font-size:.98rem">${detail}</td></tr>`;
      });
    });
    const out = document.getElementById('rcOut');
    out.innerHTML = any
      ? html + '</table></div>'
      : '<p class="hint">この条件の記録はまだ登録されていません。設定画面の記録の自動取得ボタンで取り込んでください。</p>';
    // 名前を押すと、下に詳細がひらいたり閉じたりする
    out.querySelectorAll('.rcrow').forEach(row=>{
      const btn = row.querySelector('.rcname');
      btn.onclick = ()=>{
        const detail = row.nextElementSibling;
        detail.hidden = !detail.hidden;
        btn.setAttribute('aria-expanded', String(!detail.hidden));
      };
    });
  }
  ['rcKind','rcSex','rcCourse'].forEach(id=>document.getElementById(id).onchange = draw);
  draw();
}

// "200Br" のような種目名を "200mBR" の短い表記に直す
function kentaiEventJa(ev){
  if(!ev) return '種目不明';
  const m = String(ev).match(/^(\d+)([A-Za-z]+)$/);
  if(!m) return ev;
  return m[1] + 'm' + strokeShort(m[2]);
}

// 大会名から都道府県を見つける
function kentaiPref(meet){
  return KENTAI_PREFS.find(p=>String(meet).includes(p.f)) || null;
}

// 大会名を短い表記にする。東京都選手権→東京。標準的な名前でなければカッコで補足を付ける
function kentaiMeetLabel(meet){
  const p = kentaiPref(meet);
  if(!p) return meet;
  const extra = String(meet).replace(p.f,'').replace('選手権','')
    .replace('水泳競技大会','').replace(/[（()）]/g,'').trim();
  return extra ? p.s + '(' + extra + ')' : p.s;
}

function viewKentai(){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card">
      <h2>県大会の記録</h2>
      <p class="hint">県選手権などの記録が見られます。はじめは今年の分だけ表示しています。地図やプルダウンでしぼりこめます。</p>
      <button type="button" class="btn ghost" id="ktMapBtn" aria-expanded="false"
        style="min-height:48px; margin-bottom:10px">地図(地方ブロック)から選ぶ</button>
      <div id="ktMap" hidden>
        <div id="ktBlocks" role="group" aria-label="地方ブロックを選ぶ"
          style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:10px"></div>
        <div id="ktPrefs" class="chips" role="group" aria-label="県を選ぶ"></div>
      </div>
      <div class="stack">
        <label class="fld">選手を選ぶ
          <select id="ktName"><option value="">すべての選手</option></select>
        </label>
        <label class="fld">大会を選ぶ
          <select id="ktMeet"><option value="">すべての大会</option></select>
        </label>
        <label class="fld">年を選ぶ
          <select id="ktYear"><option value="">すべての年</option></select>
        </label>
      </div>
      <p id="ktStatus" class="hint" role="status" aria-live="polite"></p>
      <div id="ktOut" style="margin-top:12px"></div>
    </div>`;

  const nSel = document.getElementById('ktName');
  const mSel = document.getElementById('ktMeet');
  const ySel = document.getElementById('ktYear');
  // 場所のしぼりこみ。t は '' (なし) / 'block' / 'pref' / 'meet'
  let place = { t:'', v:'' };

  // 選手プルダウン。まず並べて、名簿のふりがなが読めたら、あいうえお順に並べ直す
  const allNames = [...new Set(KENTAI.map(r=>r[2]))];
  function fillNames(kanaMap){
    const keep = nSel.value;
    const key = n => (kanaMap && kanaMap[n]) || n;
    const sorted = allNames.slice().sort((a,b)=>key(a).localeCompare(key(b),'ja'));
    nSel.innerHTML = '<option value="">すべての選手</option>';
    sorted.forEach(n=>{
      const o = document.createElement('option'); o.value = n; o.textContent = n;
      nSel.appendChild(o);
    });
    nSel.value = keep;
  }
  fillNames(null);
  // 名簿(ふりがな付き)が手に入ったら並べ直す。通信できないときは何もしない
  loadInit().then(()=>{
    if(!INIT || !INIT.roster) return;
    const kanaMap = {};
    INIT.roster.forEach(p=>{ if(p.kana) kanaMap[p.name] = p.kana; });
    fillNames(kanaMap);
  }).catch(()=>{});

  // 大会プルダウン。短い表記にして、県のよみがなで、あいうえお順
  const meetList = [...new Set(KENTAI.map(r=>r[1]))].map(mt=>{
    const p = kentaiPref(mt);
    return { meet:mt, label:kentaiMeetLabel(mt), kana:(p? p.k : mt), block:(p? p.b : '') };
  }).sort((a,b)=> a.kana.localeCompare(b.kana,'ja') || a.label.localeCompare(b.label,'ja'));
  meetList.forEach(x=>{
    const o = document.createElement('option'); o.value = x.meet; o.textContent = x.label;
    mSel.appendChild(o);
  });

  const ktYears = [...new Set(KENTAI.map(r=>r[0].slice(0,4)))].sort((a,b)=>b.localeCompare(a));
  ktYears.forEach(y=>{
    const o = document.createElement('option'); o.value = y; o.textContent = y + '年'; ySel.appendChild(o);
  });
  // はじめは、いちばん新しい年(今年)だけを表示する
  if(ktYears.length) ySel.value = ktYears[0];

  // 簡易日本地図。地方ブロックのボタンを日本の並びで置く。データのない地方は押せない
  const blocksWithData = new Set(meetList.map(x=>x.block).filter(Boolean));
  const BLOCK_POS = [
    { b:'北海道',    col:6, row:1 },
    { b:'東北',      col:5, row:1 },
    { b:'北信越',    col:4, row:1 },
    { b:'関東',      col:4, row:2 },
    { b:'東海',      col:3, row:2 },
    { b:'近畿',      col:2, row:2 },
    { b:'中国',      col:1, row:2 },
    { b:'四国',      col:2, row:3 },
    { b:'九州・沖縄', col:1, row:3 }
  ];
  const blockBox = document.getElementById('ktBlocks');
  BLOCK_POS.forEach(x=>{
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'chip'; btn.textContent = x.b;
    btn.style.gridColumn = x.col; btn.style.gridRow = x.row;
    btn.style.minHeight = '48px';
    btn.dataset.block = x.b;
    if(!blocksWithData.has(x.b)){
      btn.disabled = true; btn.setAttribute('aria-disabled','true');
      btn.title = 'この地方の記録はまだありません';
      btn.style.opacity = '0.4';
    } else {
      btn.setAttribute('aria-label', x.b + '地方の記録にしぼりこむ');
      btn.onclick = ()=>{ setPlace('block', x.b); };
    }
    blockBox.appendChild(btn);
  });

  const mapBtn = document.getElementById('ktMapBtn');
  const mapBox = document.getElementById('ktMap');
  mapBtn.onclick = ()=>{
    const open = mapBox.hidden;
    mapBox.hidden = !open;
    mapBtn.setAttribute('aria-expanded', String(open));
    mapBtn.textContent = open ? '地図をとじる' : '地図(地方ブロック)から選ぶ';
  };

  function paintMap(){
    blockBox.querySelectorAll('.chip').forEach(b=>{
      b.classList.toggle('on', place.t==='block' && b.dataset.block===place.v);
    });
    const prefBox = document.getElementById('ktPrefs');
    prefBox.innerHTML = '';
    // 選んだ地方の県ボタンを、あいうえお順で出す。県を選び直せるように地方選択中もpref選択中も出す
    const curBlock = place.t==='block' ? place.v
      : place.t==='pref' ? (KENTAI_PREFS.find(p=>p.s===place.v)||{}).b : '';
    if(!curBlock) return;
    const prefsHere = KENTAI_PREFS.filter(p=>p.b===curBlock &&
        meetList.some(x=>{ const mp = kentaiPref(x.meet); return mp && mp.s===p.s; }))
      .sort((a,b)=>a.k.localeCompare(b.k,'ja'));
    const all = document.createElement('button');
    all.type='button'; all.className = 'chip' + (place.t==='block' ? ' on':'');
    all.textContent = curBlock + 'ぜんぶ';
    all.onclick = ()=>{ setPlace('block', curBlock); };
    prefBox.appendChild(all);
    prefsHere.forEach(p=>{
      const b = document.createElement('button');
      b.type='button'; b.className = 'chip' + (place.t==='pref' && place.v===p.s ? ' on':'');
      b.textContent = p.s;
      b.setAttribute('aria-label', p.s + 'の記録にしぼりこむ');
      b.onclick = ()=>{ setPlace('pref', p.s); };
      prefBox.appendChild(b);
    });
  }

  function setPlace(t, v){
    place = { t:t||'', v:v||'' };
    if(t!=='meet') mSel.value = '';
    paintMap();
    draw();
  }

  function placeText(){
    if(place.t==='block') return place.v + '地方';
    if(place.t==='pref') return place.v;
    if(place.t==='meet') return kentaiMeetLabel(place.v);
    return '';
  }

  function draw(){
    const name = nSel.value, year = ySel.value;
    const rows = KENTAI.filter(r=>{
      if(name && r[2]!==name) return false;
      if(year && r[0].slice(0,4)!==year) return false;
      if(place.t==='meet' && r[1]!==place.v) return false;
      if(place.t==='pref'){ const p = kentaiPref(r[1]); if(!p || p.s!==place.v) return false; }
      if(place.t==='block'){ const p = kentaiPref(r[1]); if(!p || p.b!==place.v) return false; }
      return true;
    }).slice().sort((a,b)=> b[0].localeCompare(a[0]));
    const pt = placeText();
    document.getElementById('ktStatus').textContent =
      (pt? pt + 'で ' : '') + (year? year + '年の' : '') + rows.length +
      '件の記録が見つかりました。新しい日付から順に並んでいます。大会名を押すと日付と正式な大会名、種目名を押すとラウンドや順位が出ます。';
    const out = document.getElementById('ktOut');
    if(rows.length===0){ out.innerHTML = '<p class="hint">この条件の記録はありません。</p>'; return; }
    let html = '<div class="tablewrap"><table>' +
      '<tr><th>大会</th><th>名前</th><th>種目</th><th>記録</th></tr>';
    rows.forEach((r,idx)=>{
      const grade = r[3] ? '('+esc(r[3])+')' : '';
      const time = r[6] ? esc(r[6]) : '-';
      const best = r[8] ? BEST_MARK : '';
      html += `<tr>
        <td><button type="button" class="ktcell" data-i="${idx}" data-k="meet" aria-expanded="false"
          aria-label="${esc(kentaiMeetLabel(r[1]))}。押すと日付と大会名が出ます">${esc(kentaiMeetLabel(r[1]))}</button></td>
        <td class="nw" style="font-weight:700">${esc(r[2])}${grade}</td>
        <td><button type="button" class="ktcell" data-i="${idx}" data-k="ev" aria-expanded="false"
          aria-label="${esc(kentaiEventJa(r[4]))}。押すとラウンドと順位が出ます">${esc(kentaiEventJa(r[4]))}</button></td>
        <td class="num nw">${best}${time}</td></tr>
      <tr class="ktdetail" data-i="${idx}" hidden><td colspan="4">
        <div class="ktd-meet" hidden>日付: ${esc(r[0])}　大会: ${esc(r[1])}</div>
        <div class="ktd-ev" hidden>ラウンド: ${esc(r[5]||'-')}　順位: ${esc(r[7]||'-')}　備考: ${esc(r[9]||'-')}</div>
      </td></tr>`;
    });
    html += '</table></div>';
    out.innerHTML = html;
    // 大会名や種目名を押すと、そのすぐ下に詳しい情報がひらいたり閉じたりする
    out.querySelectorAll('button.ktcell').forEach(b=>{
      b.onclick = ()=>{
        const det = out.querySelector(`tr.ktdetail[data-i="${b.dataset.i}"]`);
        const box = det.querySelector(b.dataset.k==='meet' ? '.ktd-meet' : '.ktd-ev');
        box.hidden = !box.hidden;
        b.setAttribute('aria-expanded', String(!box.hidden));
        det.hidden = det.querySelector('.ktd-meet').hidden && det.querySelector('.ktd-ev').hidden;
      };
    });
  }
  nSel.onchange = draw;
  ySel.onchange = draw;
  mSel.onchange = ()=>{ setPlace(mSel.value? 'meet':'', mSel.value); };
  draw();
}

/* ============================================================
   閲覧 6: グラフ (選手×種目の記録の推移)
   距離・種目・水路は、その選手が出場したものだけ選べます
============================================================ */
function viewGraph(autoName){
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div class="card"><h2>グラフにする選手を選ぶ</h2><div id="gFinder"></div></div>
    <div id="gStage"></div>`;
  makeFinder(document.getElementById('gFinder'), showAthlete);
  if(autoName){
    const p = INIT.roster.find(x=>x.name===autoName);
    if(p) showAthlete(p);
  }
  function showAthlete(p){
    const stage = document.getElementById('gStage');
    // 出場した種目だけをあつめる (泳法_距離_水路 → 記録の一覧)
    const evs = {};
    DATA.records.map(rec).forEach(r=>{
      if(r.name!==p.name || r.sec==null) return;
      const k = r.stroke+'_'+r.dist+'_'+(r.meet.course||'長水路');
      (evs[k]=evs[k]||[]).push(r);
    });
    const keys = Object.keys(evs);
    if(keys.length===0){
      stage.innerHTML = `<div class="card"><p class="hint">${esc(p.name)}さんの記録はまだありません。</p></div>`;
      return;
    }
    stage.innerHTML = `
      <div class="card redline"><h2>${esc(p.name)} さん どの種目をグラフにしますか</h2>
        <p class="hint">出場したことのある距離と種目だけが選べます。ボタンを押すとグラフが全画面で開きます。</p>
        <div class="pick2">
          <label class="fld">距離<select id="gDist"></select></label>
          <label class="fld">種目<select id="gStroke"></select></label>
          <label class="fld">水路<select id="gCourse"></select></label>
          <span id="gCount" style="font-weight:800; font-size:1.2rem; align-self:end; padding-bottom:14px" aria-live="polite"></span>
        </div>
        <div class="stack" style="margin-top:10px">
          <button type="button" class="btn red solid big" id="gShow">グラフを全画面で見る</button>
        </div>
      </div>`;

    const dSel = document.getElementById('gDist');
    const sSel = document.getElementById('gStroke');
    const cSel = document.getElementById('gCourse');
    const parts = k => { const [st,d,cs] = k.split('_'); return {stroke:st, dist:Number(d), course:cs}; };
    function fillDist(){
      const dists = [...new Set(keys.map(k=>parts(k).dist))].sort((a,b)=>a-b);
      dSel.innerHTML = '';
      dists.forEach(d=>{
        const o = document.createElement('option');
        o.value = d; o.textContent = d+'m';
        dSel.appendChild(o);
      });
    }
    function fillStroke(){
      const d = Number(dSel.value);
      const strokes = [...new Set(keys.filter(k=>parts(k).dist===d).map(k=>parts(k).stroke))];
      // 種目の並びはいつもの順 (自由形→背→平→バタフライ→個メ)
      strokes.sort((a,b)=>STROKES.findIndex(s=>s.code===a)-STROKES.findIndex(s=>s.code===b));
      sSel.innerHTML = '';
      strokes.forEach(st=>{
        const o = document.createElement('option');
        o.value = st; o.textContent = strokeJa(st);
        sSel.appendChild(o);
      });
    }
    function fillCourse(){
      const d = Number(dSel.value), st = sSel.value;
      const courses = [...new Set(keys.filter(k=>parts(k).dist===d && parts(k).stroke===st).map(k=>parts(k).course))]
        .sort();
      cSel.innerHTML = '';
      courses.forEach(cs=>{
        const o = document.createElement('option');
        o.value = cs; o.textContent = cs;
        cSel.appendChild(o);
      });
    }
    function draw(){
      const d = Number(dSel.value), st = sSel.value, cs = cSel.value;
      const rows = evs[st+'_'+d+'_'+cs] || [];
      document.getElementById('gCount').textContent = rows.length + '本';
      const btn = document.getElementById('gShow');
      btn.disabled = rows.length===0;
      btn.onclick = ()=>renderProgress('gChart', 'gTitle', 'gChartBox', p, st, d, cs);
    }
    dSel.onchange = ()=>{ fillStroke(); fillCourse(); draw(); };
    sSel.onchange = ()=>{ fillCourse(); draw(); };
    cSel.onchange = draw;
    // 最初は、いちばん多く泳いでいる種目を自動で選んでおく
    fillDist();
    let bestKey = keys[0];
    keys.forEach(k=>{ if(evs[k].length > evs[bestKey].length) bestKey = k; });
    const bp = parts(bestKey);
    dSel.value = bp.dist;
    fillStroke();
    sSel.value = bp.stroke;
    fillCourse();
    cSel.value = bp.course;
    draw();
    if(!autoName) stage.scrollIntoView({behavior:'smooth'});
  }
}
