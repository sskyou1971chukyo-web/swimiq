<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>動画タグ帳</title>
<style>
  :root {
    --bg: #0d1321;
    --panel: #1a2236;
    --panel2: #232e4a;
    --text: #f5f7ff;
    --sub: #b9c4e0;
    --accent: #ffd34d;
    --accent-text: #1a1500;
    --danger: #ff6b6b;
    --ok: #5dd39e;
    --line: #3a4a72;
  }
  * { box-sizing: border-box; }
  html { font-size: 18px; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  header {
    padding: 20px 16px 12px;
    border-bottom: 3px solid var(--accent);
  }
  h1 {
    margin: 0;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
  }
  header p {
    margin: 4px 0 0;
    color: var(--sub);
    font-size: 0.95rem;
  }
  main { padding: 16px; max-width: 760px; margin: 0 auto; }
  section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
  }
  h2 {
    margin: 0 0 12px;
    font-size: 1.2rem;
    color: var(--accent);
  }
  label {
    display: block;
    font-size: 1rem;
    margin-bottom: 6px;
    color: var(--sub);
  }
  input[type="text"], input[type="search"], textarea {
    width: 100%;
    min-height: 56px;
    font-size: 1.1rem;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2px solid var(--line);
    background: var(--panel2);
    color: var(--text);
  }
  textarea { min-height: 96px; resize: vertical; }
  input:focus, textarea:focus, button:focus, video:focus {
    outline: 4px solid var(--accent);
    outline-offset: 2px;
  }
  button {
    min-height: 56px;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: var(--accent-text); width: 100%; }
  .btn-secondary {
    background: var(--panel2);
    color: var(--text);
    border: 2px solid var(--line);
  }
  .btn-danger { background: transparent; color: var(--danger); border: 2px solid var(--danger); }
  .file-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 72px;
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
  }
  #fileInput {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }
  video {
    width: 100%;
    border-radius: 10px;
    background: #000;
    margin-top: 12px;
  }
  .filename {
    margin-top: 10px;
    font-size: 1rem;
    color: var(--sub);
    word-break: break-all;
  }
  .tag-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .tag-row input { flex: 1; }
  .tag-row button { flex-shrink: 0; }
  ul.tags {
    list-style: none;
    padding: 0;
    margin: 0 0 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  ul.tags li { margin: 0; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--panel2);
    border: 2px solid var(--accent);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 8px 8px 16px;
    font-size: 1.05rem;
  }
  .chip button {
    min-height: 44px;
    min-width: 44px;
    border-radius: 999px;
    background: transparent;
    color: var(--danger);
    font-size: 1.3rem;
    padding: 0;
    border: none;
  }
  .quick { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .quick button {
    min-height: 48px;
    background: transparent;
    border: 2px dashed var(--line);
    color: var(--sub);
    font-weight: 400;
    border-radius: 999px;
    padding: 8px 16px;
  }
  #status {
    min-height: 32px;
    margin: 8px 0 0;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ok);
  }
  #status.error { color: var(--danger); }
  .entry {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    background: var(--panel2);
  }
  .entry h3 {
    margin: 0 0 6px;
    font-size: 1.05rem;
    word-break: break-all;
  }
  .entry .date { color: var(--sub); font-size: 0.9rem; margin: 0 0 8px; }
  .entry .etags { margin: 0 0 8px; font-size: 1.05rem; }
  .entry .etags span {
    display: inline-block;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 2px 12px;
    margin: 0 6px 6px 0;
  }
  .entry .memo { margin: 0 0 12px; white-space: pre-wrap; }
  .entry-actions { display: flex; gap: 10px; }
  .entry-actions button { flex: 1; }
  .backup-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .backup-row button { flex: 1; min-width: 140px; }
  .empty { color: var(--sub); }
  @media (prefers-reduced-motion: no-preference) {
    .chip { transition: transform 0.1s ease; }
  }
</style>
</head>
<body>
<header>
  <h1>動画タグ帳</h1>
  <p>携帯の動画にタグとメモを付けて記録します</p>
</header>
<main>

<section aria-labelledby="h-select">
  <h2 id="h-select">1 動画を選ぶ</h2>
  <label class="file-btn" for="fileInput">動画ファイルを選ぶ</label>
  <input type="file" id="fileInput" accept="video/*" aria-describedby="fileHelp">
  <p id="fileHelp" class="filename">まだ動画が選ばれていません</p>
  <video id="player" controls playsinline hidden aria-label="選んだ動画のプレビュー"></video>
</section>

<section aria-labelledby="h-tag">
  <h2 id="h-tag">2 タグとメモを付ける</h2>

  <label for="tagInput">タグを入力して追加ボタンを押す</label>
  <div class="tag-row">
    <input type="text" id="tagInput" placeholder="例 自由形 田中 中京インカレ" autocomplete="off">
    <button type="button" class="btn-secondary" id="addTagBtn">追加</button>
  </div>

  <div class="quick" id="quickTags" aria-label="よく使うタグ"></div>

  <ul class="tags" id="tagList" aria-label="この動画に付けたタグ"></ul>

  <label for="memoInput">メモ 任意</label>
  <textarea id="memoInput" placeholder="気づいたことを自由に書けます"></textarea>

  <button type="button" class="btn-primary" id="saveBtn" style="margin-top:12px">この動画のタグを保存する</button>
  <p id="status" role="status" aria-live="polite"></p>
</section>

<section aria-labelledby="h-list">
  <h2 id="h-list">3 保存した一覧</h2>
  <label for="searchInput">タグやファイル名やメモで検索</label>
  <input type="search" id="searchInput" placeholder="例 平泳ぎ" autocomplete="off">
  <div id="entryList" style="margin-top:14px"></div>
</section>

<section aria-labelledby="h-backup">
  <h2 id="h-backup">バックアップ</h2>
  <p class="empty">タグの記録はこの携帯のブラウザの中に保存されています。機種変更やブラウザのデータ削除で消えるので、ときどき書き出しておくと安心です。</p>
  <div class="backup-row">
    <button type="button" class="btn-secondary" id="exportBtn">ファイルに書き出す</button>
    <label class="btn-secondary" for="importInput" style="display:flex;align-items:center;justify-content:center;flex:1;min-width:140px;min-height:56px;border-radius:12px;font-weight:700;cursor:pointer;text-align:center">ファイルから読み込む</label>
    <input type="file" id="importInput" accept="application/json,.json" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">
  </div>
</section>

</main>
<script>
(function () {
  "use strict";

  var STORE_KEY = "videoTag:entries:v1";

  var fileInput = document.getElementById("fileInput");
  var fileHelp = document.getElementById("fileHelp");
  var player = document.getElementById("player");
  var tagInput = document.getElementById("tagInput");
  var addTagBtn = document.getElementById("addTagBtn");
  var tagList = document.getElementById("tagList");
  var quickTags = document.getElementById("quickTags");
  var memoInput = document.getElementById("memoInput");
  var saveBtn = document.getElementById("saveBtn");
  var statusEl = document.getElementById("status");
  var searchInput = document.getElementById("searchInput");
  var entryList = document.getElementById("entryList");
  var exportBtn = document.getElementById("exportBtn");
  var importInput = document.getElementById("importInput");

  var currentFile = null;     // { name, size }
  var currentTags = [];       // 今編集中のタグ
  var objectUrl = null;

  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return [];
      var data = JSON.parse(raw);
      return Array.isArray(data) ? data : [];
    } catch (e) {
      return [];
    }
  }

  function saveEntries(entries) {
    localStorage.setItem(STORE_KEY, JSON.stringify(entries));
  }

  function entryKey(name, size) {
    return name + "::" + size;
  }

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.className = isError ? "error" : "";
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderTags() {
    tagList.innerHTML = "";
    currentTags.forEach(function (tag, i) {
      var li = document.createElement("li");
      var span = document.createElement("span");
      span.className = "chip";
      span.appendChild(document.createTextNode(tag));
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = "×";
      btn.setAttribute("aria-label", "タグ " + tag + " を削除");
      btn.addEventListener("click", function () {
        currentTags.splice(i, 1);
        renderTags();
      });
      span.appendChild(btn);
      li.appendChild(span);
      tagList.appendChild(li);
    });
  }

  function allUsedTags() {
    var entries = loadEntries();
    var count = {};
    entries.forEach(function (e) {
      (e.tags || []).forEach(function (t) {
        count[t] = (count[t] || 0) + 1;
      });
    });
    return Object.keys(count).sort(function (a, b) {
      return count[b] - count[a];
    });
  }

  function renderQuickTags() {
    quickTags.innerHTML = "";
    var tags = allUsedTags().slice(0, 8);
    tags.forEach(function (t) {
      var b = document.createElement("button");
      b.type = "button";
      b.textContent = t;
      b.setAttribute("aria-label", "よく使うタグ " + t + " を追加");
      b.addEventListener("click", function () {
        addTag(t);
      });
      quickTags.appendChild(b);
    });
  }

  function addTag(raw) {
    var t = String(raw || "").trim();
    if (!t) return;
    if (currentTags.indexOf(t) !== -1) {
      setStatus("同じタグがすでにあります", true);
      return;
    }
    currentTags.push(t);
    renderTags();
    setStatus("");
  }

  function onFileSelected(file) {
    currentFile = { name: file.name, size: file.size };
    fileHelp.textContent = "選択中 " + file.name;
    if (objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = URL.createObjectURL(file);
    player.src = objectUrl;
    player.hidden = false;

    var entries = loadEntries();
    var key = entryKey(file.name, file.size);
    var found = null;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].key === key) { found = entries[i]; break; }
    }
    if (found) {
      currentTags = (found.tags || []).slice();
      memoInput.value = found.memo || "";
      setStatus("この動画には保存済みのタグがあります。編集して保存し直せます。");
    } else {
      currentTags = [];
      memoInput.value = "";
      setStatus("");
    }
    renderTags();
  }

  function saveCurrent() {
    if (!currentFile) {
      setStatus("先に動画ファイルを選んでください", true);
      return;
    }
    if (currentTags.length === 0 && !memoInput.value.trim()) {
      setStatus("タグかメモをひとつ以上入れてください", true);
      return;
    }
    var entries = loadEntries();
    var key = entryKey(currentFile.name, currentFile.size);
    var now = new Date().toISOString();
    var idx = -1;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].key === key) { idx = i; break; }
    }
    var entry = {
      key: key,
      name: currentFile.name,
      size: currentFile.size,
      tags: currentTags.slice(),
      memo: memoInput.value.trim(),
      updated: now
    };
    if (idx >= 0) {
      entry.created = entries[idx].created || now;
      entries[idx] = entry;
    } else {
      entry.created = now;
      entries.unshift(entry);
    }
    saveEntries(entries);
    setStatus("保存しました " + currentFile.name);
    renderEntries();
    renderQuickTags();
  }

  function formatDate(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
  }

  function renderEntries() {
    var q = searchInput.value.trim().toLowerCase();
    var entries = loadEntries();
    var shown = entries.filter(function (e) {
      if (!q) return true;
      var hay = (e.name + " " + (e.tags || []).join(" ") + " " + (e.memo || "")).toLowerCase();
      return hay.indexOf(q) !== -1;
    });

    entryList.innerHTML = "";
    if (shown.length === 0) {
      var p = document.createElement("p");
      p.className = "empty";
      p.textContent = entries.length === 0
        ? "まだ保存された記録はありません。動画を選んでタグを付けると、ここに並びます。"
        : "検索に合う記録が見つかりませんでした。";
      entryList.appendChild(p);
      return;
    }

    shown.forEach(function (e) {
      var div = document.createElement("div");
      div.className = "entry";

      var h3 = document.createElement("h3");
      h3.textContent = e.name;
      div.appendChild(h3);

      var date = document.createElement("p");
      date.className = "date";
      date.textContent = "更新 " + formatDate(e.updated);
      div.appendChild(date);

      if (e.tags && e.tags.length) {
        var tp = document.createElement("p");
        tp.className = "etags";
        e.tags.forEach(function (t) {
          var s = document.createElement("span");
          s.textContent = t;
          tp.appendChild(s);
        });
        div.appendChild(tp);
      }

      if (e.memo) {
        var mp = document.createElement("p");
        mp.className = "memo";
        mp.textContent = e.memo;
        div.appendChild(mp);
      }

      var actions = document.createElement("div");
      actions.className = "entry-actions";

      var editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "btn-secondary";
      editBtn.textContent = "編集";
      editBtn.setAttribute("aria-label", e.name + " の記録を編集");
      editBtn.addEventListener("click", function () {
        currentFile = { name: e.name, size: e.size };
        currentTags = (e.tags || []).slice();
        memoInput.value = e.memo || "";
        fileHelp.textContent = "編集中 " + e.name + " 動画の再生には同じファイルを選び直してください";
        player.hidden = true;
        renderTags();
        setStatus("一覧から読み込みました。編集して保存し直せます。");
        var target = document.getElementById("h-tag");
        if (target.scrollIntoView) target.scrollIntoView();
      });
      actions.appendChild(editBtn);

      var delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "btn-danger";
      delBtn.textContent = "削除";
      delBtn.setAttribute("aria-label", e.name + " の記録を削除");
      delBtn.addEventListener("click", function () {
        if (!window.confirm(e.name + " の記録を削除しますか。動画ファイル自体は消えません。")) return;
        var entries2 = loadEntries().filter(function (x) { return x.key !== e.key; });
        saveEntries(entries2);
        renderEntries();
        renderQuickTags();
        setStatus("削除しました " + e.name);
      });
      actions.appendChild(delBtn);

      div.appendChild(actions);
      entryList.appendChild(div);
    });
  }

  function exportJson() {
    var data = JSON.stringify(loadEntries(), null, 2);
    var blob = new Blob([data], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var today = new Date();
    var stamp = today.getFullYear()
      + String(today.getMonth() + 1).padStart(2, "0")
      + String(today.getDate()).padStart(2, "0");
    a.href = url;
    a.download = "video_tags_" + stamp + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus("バックアップファイルを書き出しました");
  }

  function importJson(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var incoming = JSON.parse(String(reader.result));
        if (!Array.isArray(incoming)) throw new Error("形式が違います");
        var entries = loadEntries();
        var byKey = {};
        entries.forEach(function (e) { byKey[e.key] = e; });
        var added = 0, updated = 0;
        incoming.forEach(function (e) {
          if (!e || !e.key || !e.name) return;
          if (byKey[e.key]) {
            var oldTime = byKey[e.key].updated || "";
            var newTime = e.updated || "";
            if (newTime >= oldTime) { byKey[e.key] = e; updated++; }
          } else {
            byKey[e.key] = e;
            added++;
          }
        });
        var merged = Object.keys(byKey).map(function (k) { return byKey[k]; });
        merged.sort(function (a, b) {
          return String(b.updated || "").localeCompare(String(a.updated || ""));
        });
        saveEntries(merged);
        renderEntries();
        renderQuickTags();
        setStatus("読み込みました 新規 " + added + " 件 更新 " + updated + " 件");
      } catch (err) {
        setStatus("読み込みに失敗しました。書き出したファイルを選んでください。", true);
      }
    };
    reader.readAsText(file);
  }

  fileInput.addEventListener("change", function () {
    if (fileInput.files && fileInput.files[0]) onFileSelected(fileInput.files[0]);
  });

  addTagBtn.addEventListener("click", function () {
    addTag(tagInput.value);
    tagInput.value = "";
    tagInput.focus();
  });

  tagInput.addEventListener("keydown", function (ev) {
    if (ev.key === "Enter") {
      ev.preventDefault();
      addTag(tagInput.value);
      tagInput.value = "";
    }
  });

  saveBtn.addEventListener("click", saveCurrent);
  searchInput.addEventListener("input", renderEntries);
  exportBtn.addEventListener("click", exportJson);
  importInput.addEventListener("change", function () {
    if (importInput.files && importInput.files[0]) importJson(importInput.files[0]);
    importInput.value = "";
  });

  renderEntries();
  renderQuickTags();
})();
</script>
</body>
</html>
